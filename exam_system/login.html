<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - 课程习题测验系统</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #F0F2F5; }
        .tab-active { color: #1890FF; border-bottom: 2px solid #1890FF; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
<div class="w-full max-w-md bg-white rounded-lg shadow-xl overflow-hidden">
<!-- 顶部标题区 -->
<div class="bg-[#1890FF] py-8 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-4 shadow-lg">
<iconify-icon class="text-[#1890FF] text-3xl" icon="mdi:book-open-variant"></iconify-icon>
</div>
<h1 class="text-white text-2xl font-bold tracking-wider">课程习题测验系统</h1>
<p class="text-blue-100 mt-2 opacity-80">智能教学 · 精准测验 · 轻松管理</p>
</div>
<!-- 角色切换 Tab -->
<div class="flex border-b">
<button class="flex-1 py-4 text-center text-gray-500 font-medium hover:text-[#1890FF] transition-colors border-b-2 border-transparent" id="tab-admin" onclick="switchRole('admin')">管理员</button>
<button class="flex-1 py-4 text-center text-gray-500 font-medium hover:text-[#1890FF] transition-colors border-b-2 border-transparent" id="tab-teacher" onclick="switchRole('teacher')">老师</button>
<button class="flex-1 py-4 text-center text-gray-500 font-medium hover:text-[#1890FF] transition-colors border-b-2 border-transparent" id="tab-student" onclick="switchRole('student')">学生</button>
</div>
<!-- 登录表单 -->
<div class="p-8">
<form class="space-y-6" id="loginForm" onsubmit="handleLogin(event)">
<input id="currentRole" type="hidden" value="student"/>
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">账号</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
<iconify-icon icon="mdi:account"></iconify-icon>
</span>
<input class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-[#1890FF] focus:border-[#1890FF]" id="username" placeholder="请输入学号/工号/管理账号" required="" type="text"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
<iconify-icon icon="mdi:lock"></iconify-icon>
</span>
<input class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-[#1890FF] focus:border-[#1890FF]" id="password" placeholder="请输入密码" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-[#1890FF] focus:ring-[#1890FF] border-gray-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700" for="remember-me">记住密码</label>
</div>
<div class="text-sm">
<a class="font-medium text-[#1890FF] hover:text-blue-500" href="#">忘记密码？</a>
</div>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#1890FF] hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#1890FF] transition-colors" type="submit">
                    立即登录
                </button>
</form>
<div class="mt-8 pt-6 border-t border-gray-100 text-center">
<p class="text-sm text-gray-500">
                    还没有账号？<a class="font-medium text-[#1890FF] hover:underline" href="#">请联系系统管理员</a>
</p>
</div>
</div>
</div>
<script>
        function switchRole(role) {
            document.getElementById('currentRole').value = role;
            
            // 更新 UI 样式
            ['admin', 'teacher', 'student'].forEach(r => {
                const tab = document.getElementById('tab-' + r);
                if (r === role) {
                    tab.classList.add('tab-active');
                } else {
                    tab.classList.remove('tab-active');
                }
            });

            // 更新占位符
            const usernameInput = document.getElementById('username');
            if (role === 'admin') usernameInput.placeholder = '请输入管理账号';
            else if (role === 'teacher') usernameInput.placeholder = '请输入工号';
            else usernameInput.placeholder = '请输入学号';
        }

        function handleLogin(e) {
            e.preventDefault();
            const role = document.getElementById('currentRole').value;
            
            // 模拟登录逻辑
            if (role === 'admin') {
                window.location.href = 'admin_dashboard.html';
            } else if (role === 'teacher') {
                window.location.href = 'teacher_dashboard.html';
            } else {
                window.location.href = 'student_dashboard.html';
            }
        }

        // 默认激活学生
        switchRole('student');
    </script>
</body>
</html>
