<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>老师账号管理 - 课程习题测验系统</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #F0F2F5; }
        .sidebar { background-color: #001529; }
        .sidebar-item { color: rgba(255, 255, 255, 0.65); transition: all 0.3s; }
        .sidebar-item:hover { color: #fff; background-color: rgba(24, 144, 255, 0.1); }
        .sidebar-item.active { color: #fff; background-color: #1890FF; }
        .modal { transition: opacity 0.3s ease-out; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
<!-- 侧边栏 -->
<div class="sidebar w-60 flex-none flex flex-col">
<div class="h-16 flex items-center px-6 text-white text-xl font-bold border-b border-gray-800">
<iconify-icon class="mr-2 text-2xl" icon="mdi:shield-account"></iconify-icon>
            管理中心
        </div>
<nav class="flex-1 py-4 overflow-y-auto">
<a class="sidebar-item flex items-center px-6 py-4" href="admin_dashboard.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:view-dashboard"></iconify-icon>
                仪表盘
            </a>
<a class="sidebar-item active flex items-center px-6 py-4" href="admin_teachers.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:account-tie"></iconify-icon>
                老师账号管理
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="admin_students.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:school"></iconify-icon>
                学生账号管理
            </a>
<div class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">系统设置</div>
<a class="sidebar-item flex items-center px-6 py-4" href="#">
<iconify-icon class="mr-3 text-lg" icon="mdi:cog"></iconify-icon>
                系统设置
            </a>
</nav>
<div class="p-4 border-t border-gray-800">
<a class="sidebar-item flex items-center px-4 py-2 rounded" href="login.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:logout"></iconify-icon>
                退出登录
            </a>
</div>
</div>
<!-- 主内容区 -->
<div class="flex-1 flex flex-col overflow-hidden">
<!-- 顶部导航 -->
<header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
<div class="flex items-center text-gray-500">
<iconify-icon class="text-xl cursor-pointer mr-4" icon="mdi:menu"></iconify-icon>
<div class="flex items-center space-x-2 text-sm">
<span>管理中心</span>
<span class="text-gray-300">/</span>
<span class="text-gray-900 font-medium">老师账号管理</span>
</div>
</div>
<div class="flex items-center space-x-3 cursor-pointer">
<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
<iconify-icon class="text-2xl text-[#1890FF]" icon="mdi:account-circle"></iconify-icon>
</div>
<span class="text-sm font-medium text-gray-700">超级管理员</span>
</div>
</header>
<!-- 内容区域 -->
<main class="flex-1 overflow-y-auto p-8">
<div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
<!-- 顶部操作栏 -->
<div class="p-6 border-b border-gray-100 flex flex-wrap items-center justify-between gap-4">
<div class="flex items-center space-x-4">
<div class="relative">
<input class="pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-[#1890FF] w-64 text-sm" placeholder="搜索工号/姓名/手机号" type="text"/>
<iconify-icon class="absolute left-3 top-2.5 text-gray-400" icon="mdi:magnify"></iconify-icon>
</div>
<select class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#1890FF]">
<option value="">全部状态</option>
<option value="1">启用</option>
<option value="0">禁用</option>
</select>
</div>
<button class="bg-[#1890FF] text-white px-4 py-2 rounded-md text-sm font-medium flex items-center hover:bg-blue-600 transition-colors" onclick="openModal('add')">
<iconify-icon class="mr-1" icon="mdi:plus"></iconify-icon>
                        新增老师
                    </button>
</div>
<!-- 表格 -->
<div class="overflow-x-auto">
<table class="w-full text-left">
<thead>
<tr class="bg-gray-50 text-gray-500 text-sm">
<th class="px-6 py-4 font-medium">序号</th>
<th class="px-6 py-4 font-medium">工号</th>
<th class="px-6 py-4 font-medium">姓名</th>
<th class="px-6 py-4 font-medium">所属院系</th>
<th class="px-6 py-4 font-medium">手机号</th>
<th class="px-6 py-4 font-medium">状态</th>
<th class="px-6 py-4 font-medium">创建时间</th>
<th class="px-6 py-4 font-medium text-center">操作</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-100 text-sm">
<tr>
<td class="px-6 py-4">1</td>
<td class="px-6 py-4 text-blue-600 font-medium">T2021001</td>
<td class="px-6 py-4">张伟</td>
<td class="px-6 py-4 text-gray-600">数学学院</td>
<td class="px-6 py-4 text-gray-600">13800138001</td>
<td class="px-6 py-4">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">启用</span>
</td>
<td class="px-6 py-4 text-gray-500 text-xs">2026-07-01 14:30</td>
<td class="px-6 py-4 text-center">
<div class="flex items-center justify-center space-x-3">
<button class="text-blue-500 hover:text-blue-700" onclick="openModal('edit')">编辑</button>
<button class="text-orange-500 hover:text-orange-700">重置密码</button>
<button class="text-red-500 hover:text-red-700">禁用</button>
</div>
</td>
</tr>
<tr class="bg-gray-50/30">
<td class="px-6 py-4">2</td>
<td class="px-6 py-4 text-blue-600 font-medium">T2021005</td>
<td class="px-6 py-4">李芳</td>
<td class="px-6 py-4 text-gray-600">物理学院</td>
<td class="px-6 py-4 text-gray-600">13911223344</td>
<td class="px-6 py-4">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">启用</span>
</td>
<td class="px-6 py-4 text-gray-500 text-xs">2026-07-05 09:20</td>
<td class="px-6 py-4 text-center">
<div class="flex items-center justify-center space-x-3">
<button class="text-blue-500 hover:text-blue-700">编辑</button>
<button class="text-orange-500 hover:text-orange-700">重置密码</button>
<button class="text-red-500 hover:text-red-700">禁用</button>
</div>
</td>
</tr>
<tr>
<td class="px-6 py-4">3</td>
<td class="px-6 py-4 text-blue-600 font-medium">T2022012</td>
<td class="px-6 py-4">王磊</td>
<td class="px-6 py-4 text-gray-600">信息工程学院</td>
<td class="px-6 py-4 text-gray-600">18822334455</td>
<td class="px-6 py-4">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">禁用</span>
</td>
<td class="px-6 py-4 text-gray-500 text-xs">2026-07-10 11:15</td>
<td class="px-6 py-4 text-center">
<div class="flex items-center justify-center space-x-3">
<button class="text-blue-500 hover:text-blue-700">编辑</button>
<button class="text-orange-500 hover:text-orange-700">重置密码</button>
<button class="text-green-500 hover:text-green-700">启用</button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
<!-- 分页 -->
<div class="p-6 border-t border-gray-100 flex items-center justify-between text-sm">
<span class="text-gray-500">共 156 条记录，每页 10 条</span>
<div class="flex items-center space-x-2">
<button class="px-2 py-1 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50" disabled="">
<iconify-icon icon="mdi:chevron-left"></iconify-icon>
</button>
<button class="px-3 py-1 bg-[#1890FF] text-white rounded">1</button>
<button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">2</button>
<button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">3</button>
<button class="px-2 py-1 border border-gray-300 rounded hover:bg-gray-50">
<iconify-icon icon="mdi:chevron-right"></iconify-icon>
</button>
</div>
</div>
</div>
</main>
</div>
<!-- 模态框 -->
<div class="fixed inset-0 z-50 flex items-center justify-center hidden" id="modal">
<div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
<div class="relative bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
<h3 class="text-lg font-bold text-gray-800" id="modalTitle">新增老师</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="closeModal()">
<iconify-icon class="text-xl" icon="mdi:close"></iconify-icon>
</button>
</div>
<div class="p-6">
<form class="space-y-4">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">工号 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="t_id" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="t_name" type="text"/>
</div>
<div id="passwordField">
<label class="block text-sm font-medium text-gray-700 mb-1">初始密码 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" placeholder="默认 123456" type="password"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">所属院系 <span class="text-red-500">*</span></label>
<select class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none">
<option value="">请选择院系</option>
<option value="1">数学学院</option>
<option value="2">物理学院</option>
<option value="3">信息工程学院</option>
<option value="4">外国语学院</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="t_phone" type="text"/>
</div>
<div class="pt-4 flex justify-end space-x-3">
<button class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200" onclick="closeModal()" type="button">取消</button>
<button class="px-4 py-2 text-sm font-medium text-white bg-[#1890FF] rounded-md hover:bg-blue-600" onclick="closeModal()" type="button">确定</button>
</div>
</form>
</div>
</div>
</div>
<script>
        function openModal(type) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const pwdField = document.getElementById('passwordField');
            
            modal.classList.remove('hidden');
            if (type === 'edit') {
                title.innerText = '编辑老师信息';
                pwdField.classList.add('hidden');
                document.getElementById('t_id').value = 'T2021001';
                document.getElementById('t_name').value = '张伟';
                document.getElementById('t_phone').value = '13800138001';
            } else {
                title.innerText = '新增老师';
                pwdField.classList.remove('hidden');
                document.getElementById('t_id').value = '';
                document.getElementById('t_name').value = '';
                document.getElementById('t_phone').value = '';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
