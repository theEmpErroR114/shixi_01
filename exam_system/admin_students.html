<body class="flex h-screen overflow-hidden">
<!-- 侧边栏 -->

<nav class="flex-1 py-4 overflow-y-auto">

<a class="sidebar-item flex items-center px-6 py-4" href="admin_teachers.html">

<!-- 主内容区 -->
<div class="flex-1 flex flex-col overflow-hidden">

<!-- 内容区域 -->
<main class="flex-1 overflow-y-auto p-8">

<iconify-icon class="absolute left-3 top-2.5 text-gray-400" icon="mdi:magnify"></iconify-icon>
</div>
<select class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#1890FF]">
<option value="">所有院系</option>
<option value="1">数学学院</option>
<option value="2">物理学院</option>
<option value="3">信息工程学院</option>
</select>
<select class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#1890FF]">
<option value="">所有班级</option>
<option value="202401">24级1班</option>
<option value="202402">24级2班</option>
</select>
</div>
<div class="flex space-x-2">
<button class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-md text-sm font-medium flex items-center hover:bg-gray-50 transition-colors">
<iconify-icon class="mr-1" icon="mdi:download"></iconify-icon>
                            批量导入
                        </button>
<button class="bg-[#1890FF] text-white px-4 py-2 rounded-md text-sm font-medium flex items-center hover:bg-blue-600 transition-colors" onclick="openModal('add')">
<iconify-icon class="mr-1" icon="mdi:plus"></iconify-icon>
                            新增学生
                        </button>
</div>
</div>
<!-- 表格 -->
<div class="overflow-x-auto">
<table class="w-full text-left">
<thead>
<tr class="bg-gray-50 text-gray-500 text-sm">
<th class="px-6 py-4 font-medium">序号</th>
<th class="px-6 py-4 font-medium">学号</th>
<th class="px-6 py-4 font-medium">姓名</th>
<th class="px-6 py-4 font-medium">院系/班级</th>
<th class="px-6 py-4 font-medium">手机号</th>
<th class="px-6 py-4 font-medium">状态</th>
<th class="px-6 py-4 font-medium">创建时间</th>
<th class="px-6 py-4 font-medium text-center">操作</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-100 text-sm">
<tr>
<td class="px-6 py-4">1</td>
<td class="px-6 py-4 text-[#1890FF] font-medium">20240001</td>
<td class="px-6 py-4">赵敏</td>

<div class="text-gray-400 text-xs mt-0.5">24级1班</div>
</td>
<td class="px-6 py-4 text-gray-600">13511223344</td>
<td class="px-6 py-4">
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-green-50 text-green-600">在线</span>
</td>
<td class="px-6 py-4 text-gray-500 text-xs">2026-07-01 10:30</td>
<td class="px-6 py-4 text-center">
<div class="flex items-center justify-center space-x-3">
<button class="text-blue-500 hover:underline">编辑</button>
<button class="text-red-500 hover:underline">禁用</button>
</div>
</td>
</tr>
<tr class="bg-gray-50/30">
<td class="px-6 py-4">2</td>
<td class="px-6 py-4 text-[#1890FF] font-medium">20240002</td>
<td class="px-6 py-4">钱程</td>
<td class="px-6 py-4">
<div class="text-gray-800">数学学院</div>
<div class="text-gray-400 text-xs mt-0.5">24级1班</div>
</td>
<td class="px-6 py-4 text-gray-600">13611223344</td>
<td class="px-6 py-4">
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-500">离线</span>
</td>
<td class="px-6 py-4 text-gray-500 text-xs">2026-07-01 10:35</td>
<td class="px-6 py-4 text-center">
<div class="flex items-center justify-center space-x-3">
<button class="text-blue-500 hover:underline">编辑</button>
<button class="text-red-500 hover:underline">禁用</button>
</div>
</td>
</tr>

<td class="px-6 py-4">
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-green-50 text-green-600">在线</span>
</td>
<td class="px-6 py-4 text-gray-500 text-xs">2026-07-02 09:12</td>
<td class="px-6 py-4 text-center">
<div class="flex items-center justify-center space-x-3">
<button class="text-blue-500 hover:underline">编辑</button>
<button class="text-red-500 hover:underline">禁用</button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
<!-- 分页 -->
<div class="p-6 border-t border-gray-100 flex items-center justify-between text-sm">
<span class="text-gray-500">共 3285 条记录</span>
<div class="flex items-center space-x-2">
<button class="px-2 py-1 border border-gray-300 rounded hover:bg-gray-50">上页</button>
<button class="px-3 py-1 bg-[#1890FF] text-white rounded">1</button>
<button class="px-3 py-1 border border-gray-300 rounded">2</button>
<button class="px-3 py-1 border border-gray-300 rounded">3</button>

<!-- 模态框 (简单逻辑同前) -->
<div class="fixed inset-0 z-50 flex items-center justify-center hidden" id="modal">
<div class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>
<div class="relative bg-white rounded-lg shadow-xl w-full max-w-md p-6">
<h3 class="text-lg font-bold mb-4">新增学生</h3>
<div class="space-y-4 text-sm">
<div><label class="block mb-1">学号</label><input class="w-full border rounded px-3 py-2" type="text"/></div>
<div><label class="block mb-1">姓名</label><input class="w-full border rounded px-3 py-2" type="text"/></div>
<div class="grid grid-cols-2 gap-4">
<div><label class="block mb-1">院系</label><select class="w-full border rounded px-3 py-2"><option>数学学院</option></select></div>
<div><label class="block mb-1">班级</label><select class="w-full border rounded px-3 py-2"><option>24级1班</option></select></div>
</div>
<div><label class="block mb-1">手机号</label><input class="w-full border rounded px-3 py-2" type="text"/></div>
<div class="pt-4 flex justify-end space-x-2">
<button class="px-4 py-2 bg-gray-100 rounded" onclick="closeModal()">取消</button>
<button class="px-4 py-2 bg-[#1890FF] text-white rounded" onclick="closeModal()">保存</button>
</div>
</div>
</div>
</div>
<script>
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>

</html>
