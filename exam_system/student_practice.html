<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>抽题练习 - 课程习题测验系统</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #F0F2F5; }
        .option-btn:hover { border-color: #1890FF; background-color: #f0f9ff; }
        .option-btn.active { border-color: #1890FF; background-color: #e6f7ff; color: #1890FF; }
        .nav-active { color: #1890FF; border-bottom: 2px solid #1890FF; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<header class="bg-white shadow-sm">
<div class="max-w-7xl mx-auto px-4 flex items-center h-16">
<div class="flex items-center mr-12">
<iconify-icon class="text-2xl text-[#1890FF] mr-2" icon="mdi:book-open-page-variant"></iconify-icon>
<span class="text-xl font-bold text-gray-800">学习系统</span>
</div>
<nav class="flex space-x-8 h-full">
<a class="flex items-center h-full px-2 text-gray-500 hover:text-[#1890FF] font-medium" href="student_dashboard.html">我的首页</a>
<a class="flex items-center h-full px-2 nav-active font-medium" href="student_practice.html">抽题练习</a>
<a class="flex items-center h-full px-2 text-gray-500 hover:text-[#1890FF] font-medium" href="student_exam.html">参加测验</a>
<a class="flex items-center h-full px-2 text-gray-500 hover:text-[#1890FF] font-medium" href="student_results.html">我的成绩</a>
</nav>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-8 overflow-hidden">
<!-- 配置练习 -->
<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg" id="setupArea">
<h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">抽题练习配置</h2>
<div class="space-y-6">
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">选择课程</label>
<select class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-1 focus:ring-[#1890FF]">
<option>高等数学 (上)</option>
<option>高等数学 (下)</option>
<option>线性代数</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">练习范围</label>
<select class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-1 focus:ring-[#1890FF]">
<option>全部章节</option>
<option>第一章 函数与极限</option>
<option>第二章 导数与微分</option>
</select>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">题目数量</label>
<input class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-1 focus:ring-[#1890FF]" type="number" value="10"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-2">题型筛选</label>
<select class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-1 focus:ring-[#1890FF]">
<option>混合题型</option>
<option>纯单选题</option>
</select>
</div>
</div>
<button class="w-full py-4 bg-[#1890FF] text-white rounded-xl text-lg font-bold shadow-lg hover:bg-blue-600 transition-colors mt-4" onclick="startPractice()">开始练习</button>
</div>
</div>
<!-- 答题区域 -->
<div class="hidden flex h-[600px] w-full max-w-6xl bg-white rounded-2xl shadow-xl overflow-hidden" id="practiceArea">
<!-- 左侧答题卡 -->
<div class="w-64 border-r border-gray-100 p-6 flex flex-col">
<h3 class="font-bold text-gray-800 mb-4">答题卡 (3/10)</h3>
<div class="grid grid-cols-5 gap-2">
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer bg-green-500 text-white border-green-500">1</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer bg-green-500 text-white border-green-500">2</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer bg-blue-500 text-white border-blue-500">3</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer text-gray-400 border-gray-200">4</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer text-gray-400 border-gray-200">5</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer text-gray-400 border-gray-200">6</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer text-gray-400 border-gray-200">7</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer text-gray-400 border-gray-200">8</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer text-gray-400 border-gray-200">9</div>
<div class="w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer text-gray-400 border-gray-200">10</div>
</div>
<div class="mt-auto space-y-2">
<div class="flex items-center text-xs text-gray-400">
<span class="w-3 h-3 bg-green-500 rounded-sm mr-2"></span> 已答
                        <span class="w-3 h-3 bg-blue-500 rounded-sm ml-4 mr-2"></span> 当前
                        <span class="w-3 h-3 border border-gray-200 rounded-sm ml-4 mr-2"></span> 未答
                    </div>
<div class="pt-4 border-t text-sm font-medium text-gray-700">
                        已用时间: <span class="text-[#1890FF]">05:12</span>
</div>
</div>
</div>
<!-- 右侧题目 -->
<div class="flex-1 flex flex-col">
<div class="p-10 flex-1 overflow-y-auto">
<div class="flex items-center space-x-2 mb-6">
<span class="px-2 py-0.5 bg-blue-50 text-blue-600 text-xs font-bold rounded">单选题</span>
<span class="text-gray-400 text-sm">分值：10分</span>
</div>
<div class="text-xl font-bold text-gray-800 leading-relaxed mb-8">
                        设 f(x) = x³ + 3x² - 9x + 5，求函数 f(x) 的极小值点。
                    </div>
<div class="space-y-4">
<button class="option-btn w-full text-left p-5 border-2 rounded-xl transition-all flex items-center">
<span class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center mr-4 font-bold">A</span>
                            x = -3
                        </button>
<button class="option-btn active w-full text-left p-5 border-2 rounded-xl transition-all flex items-center">
<span class="w-8 h-8 rounded-full border-[#1890FF] bg-[#1890FF] text-white flex items-center justify-center mr-4 font-bold">B</span>
                            x = 1
                        </button>
<button class="option-btn w-full text-left p-5 border-2 rounded-xl transition-all flex items-center">
<span class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center mr-4 font-bold">C</span>
                            x = 2
                        </button>
<button class="option-btn w-full text-left p-5 border-2 rounded-xl transition-all flex items-center">
<span class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center mr-4 font-bold">D</span>
                            x = 0
                        </button>
</div>
</div>
<div class="px-10 py-6 border-t border-gray-50 flex justify-between items-center bg-gray-50/30">
<button class="px-6 py-2 border border-gray-200 rounded text-gray-500 hover:bg-white transition-colors">上一题</button>
<button class="px-10 py-2 bg-[#1890FF] text-white rounded font-bold hover:bg-blue-600 shadow-md" onclick="finishPractice()">下一题</button>
</div>
</div>
</div>
<!-- 结果反馈 (模拟) -->
<div class="hidden bg-white p-10 rounded-2xl shadow-xl w-full max-w-xl text-center" id="resultArea">
<div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
<iconify-icon class="text-5xl text-green-500" icon="mdi:check-circle"></iconify-icon>
</div>
<h2 class="text-3xl font-bold text-gray-800 mb-2">练习完成！</h2>
<p class="text-gray-500 mb-8">本次练习共 10 题，正确 9 题，错误 1 题</p>
<div class="flex justify-center space-x-12 mb-10">
<div><p class="text-xs text-gray-400">正确率</p><p class="text-2xl font-bold text-green-500">90%</p></div>
<div><p class="text-xs text-gray-400">耗时</p><p class="text-2xl font-bold text-gray-800">08:45</p></div>
<div><p class="text-xs text-gray-400">击败同学</p><p class="text-2xl font-bold text-blue-500">85%</p></div>
</div>
<div class="flex space-x-4">
<button class="flex-1 py-3 border border-[#1890FF] text-[#1890FF] rounded-lg font-bold" onclick="location.reload()">查看错题解析</button>
<button class="flex-1 py-3 bg-[#1890FF] text-white rounded-lg font-bold" onclick="location.reload()">再来一组</button>
</div>
</div>
</main>
<script>
        function startPractice() {
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('practiceArea').classList.remove('hidden');
        }
        function finishPractice() {
            document.getElementById('practiceArea').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
        }
    </script>
</body>
</html>
