<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>管理员控制台 - 课程习题测验系统</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>

<style>
        body { background-color: #F0F2F5; }
        .sidebar { background-color: #001529; }
        .sidebar-item { color: rgba(255, 255, 255, 0.65); transition: all 0.3s; }
        .sidebar-item:hover { color: #fff; background-color: rgba(24, 144, 255, 0.1); }
        .sidebar-item.active { color: #fff; background-color: #1890FF; }
        .sidebar.collapsed { display: none; }
        .user-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 6px 16px rgba(0,0,0,0.12); min-width: 140px; z-index: 50; display: none; }
        .user-dropdown.show { display: block; }
        .user-dropdown a { display: flex; align-items: center; padding: 10px 16px; font-size: 14px; color: #595959; text-decoration: none; transition: background 0.2s; }
        .user-dropdown a:hover { background: #f5f5f5; }
</style>
</head>
<body class="flex h-screen overflow-hidden">
<!-- 侧边栏 -->
<div id="sidebar" class="sidebar w-60 flex-none flex flex-col">
<div class="h-16 flex items-center px-6 text-white text-xl font-bold border-b border-gray-800">
<iconify-icon class="mr-2 text-2xl" icon="mdi:shield-account"></iconify-icon>
            管理中心
        </div>
<nav class="flex-1 py-4 overflow-y-auto">
<a class="sidebar-item active flex items-center px-6 py-4" href="admin_dashboard.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:view-dashboard"></iconify-icon>
                仪表盘
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="admin_teachers.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:account-tie"></iconify-icon>
                老师账号管理
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="admin_students.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:school"></iconify-icon>
                学生账号管理
            </a>

</nav>


</div>
<!-- 主内容区 -->
<div class="flex-1 flex flex-col overflow-hidden">
<!-- 顶部导航 -->
<header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
<div class="flex items-center text-gray-500">
<iconify-icon id="menuToggle" class="text-xl cursor-pointer mr-4" icon="mdi:menu"></iconify-icon>
<div class="flex items-center space-x-2 text-sm">
<span>管理中心</span>
<span class="text-gray-300">/</span>
<span class="text-gray-900 font-medium">仪表盘</span>
</div>
</div>
<div class="relative">
<div class="flex items-center space-x-3 cursor-pointer" id="userMenuTrigger">
<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
<iconify-icon class="text-2xl text-[#1890FF]" icon="mdi:account-circle"></iconify-icon>
</div>
<span class="text-sm font-medium text-gray-700" id="adminName">管理员</span>
<iconify-icon class="text-gray-400 text-sm" icon="mdi:chevron-down"></iconify-icon>
</div>
<div class="user-dropdown" id="userDropdown">
<a href="login.html">
<iconify-icon class="mr-2" icon="mdi:logout"></iconify-icon>
                                    退出登录
                                </a>
</div>
</div>
</header>
<!-- 内容区域 -->
<main class="flex-1 overflow-y-auto p-8">
<!-- KPI 卡片 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
<div class="flex items-center justify-between mb-4">
<div class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center">
<iconify-icon class="text-2xl text-blue-500" icon="mdi:account-tie"></iconify-icon>
</div>
</div>
<h3 class="text-gray-500 text-sm font-medium">老师总数</h3>
<p class="text-2xl font-bold text-gray-800 mt-1" id="teacherCount">--</p>
</div>
<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
<div class="flex items-center justify-between mb-4">
<div class="w-12 h-12 bg-purple-50 rounded-lg flex items-center justify-center">
<iconify-icon class="text-2xl text-purple-500" icon="mdi:school"></iconify-icon>
</div>
</div>
<h3 class="text-gray-500 text-sm font-medium">学生总数</h3>
<p class="text-2xl font-bold text-gray-800 mt-1" id="studentCount">--</p>
</div>
</div>


</main>
</div>
<script>
    var API_BASE = '/api';

    function apiGet(url, params) {
        var query = params ? '?' + new URLSearchParams(params).toString() : '';
        return fetch(API_BASE + url + query, { credentials: 'include' }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    function apiPost(url, data) {
        return fetch(API_BASE + url, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    function apiPut(url, data) {
        return fetch(API_BASE + url, { method: 'PUT', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        // 侧边栏切换
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        });

        // 用户下拉菜单切换
        var userMenuTrigger = document.getElementById('userMenuTrigger');
        var userDropdown = document.getElementById('userDropdown');
        userMenuTrigger.addEventListener('click', function(e) {
            e.stopPropagation();
            userDropdown.classList.toggle('show');
        });
        document.addEventListener('click', function() {
            userDropdown.classList.remove('show');
        });

        // 加载当前管理员信息
        apiGet('/auth/current-user').then(function(user) {
            var name = user.data ? (user.data.realName || user.data.username) : (user.realName || user.username);
            if (name) {
                document.getElementById('adminName').textContent = name;
            }
        }).catch(function() {
            // 静默处理，保持默认显示
        });

        // 加载仪表盘统计数据
        apiGet('/admin/dashboard/stats').then(function(data) {
            var stats = data.data || data;
            if (stats.teacherCount !== undefined) {
                document.getElementById('teacherCount').textContent = stats.teacherCount.toLocaleString();
            }
            if (stats.studentCount !== undefined) {
                document.getElementById('studentCount').textContent = stats.studentCount.toLocaleString();
            }
        }).catch(function() {
            // 静默处理，保持默认显示
        });
    });
</script>
</body>
</html>
