<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>学生账号管理 - 课程习题测验系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="iconify-icon.min.js"></script>
<style>
        body { background-color: #F0F2F5; }
        .sidebar { background-color: #001529; }
        .sidebar-item { color: rgba(255, 255, 255, 0.65); transition: all 0.3s; }
        .sidebar-item:hover { color: #fff; background-color: rgba(24, 144, 255, 0.1); }
        .sidebar-item.active { color: #fff; background-color: #1890FF; }
        .sidebar.collapsed { display: none; }
        .user-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 6px 16px rgba(0,0,0,0.12); min-width: 140px; z-index: 50; display: none; }
        .user-dropdown.show { display: block; }
        .user-dropdown a { display: flex; align-items: center; padding: 10px 16px; font-size: 14px; color: #595959; text-decoration: none; transition: background 0.2s; }
        .user-dropdown a:hover { background: #f5f5f5; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
<!-- 侧边栏 -->
<div id="sidebar" class="sidebar w-60 flex-none flex flex-col">
<div class="h-16 flex items-center px-6 text-white text-xl font-bold border-b border-gray-800">
<iconify-icon class="mr-2 text-2xl" icon="mdi:shield-account"></iconify-icon>
            管理中心
        </div>
<nav class="flex-1 py-4 overflow-y-auto">
<a class="sidebar-item flex items-center px-6 py-4" href="admin_dashboard.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:view-dashboard"></iconify-icon>
                仪表盘
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="admin_teachers.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:account-tie"></iconify-icon>
                老师账号管理
            </a>
<a class="sidebar-item active flex items-center px-6 py-4" href="admin_students.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:school"></iconify-icon>
                学生账号管理
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="admin_courses.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:book-education"></iconify-icon>
                课程管理
            </a>
</nav>
</div>
<!-- 主内容区 -->
<div class="flex-1 flex flex-col overflow-hidden">
<!-- 顶部导航 -->
<header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
<div class="flex items-center text-gray-500">
<iconify-icon id="menuToggle" class="text-xl cursor-pointer mr-4" icon="mdi:menu"></iconify-icon>
<div class="flex items-center space-x-2 text-sm">
<span>管理中心</span>
<span class="text-gray-300">/</span>
<span class="text-gray-900 font-medium">学生账号管理</span>
</div>
</div>
<div class="relative">
<div class="flex items-center space-x-3 cursor-pointer" id="userMenuTrigger">
<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
<iconify-icon class="text-2xl text-[#1890FF]" icon="mdi:account-circle"></iconify-icon>
</div>
<span class="text-sm font-medium text-gray-700" id="adminName">管理员</span>
<iconify-icon class="text-gray-400 text-sm" icon="mdi:chevron-down"></iconify-icon>
</div>
<div class="user-dropdown" id="userDropdown">
<a href="login.html">
<iconify-icon class="mr-2" icon="mdi:logout"></iconify-icon>
                                    退出登录
                                </a>
</div>
</div>
</header>
<!-- 内容区域 -->
<main class="flex-1 overflow-y-auto p-8">
<div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
<!-- 顶部操作栏 -->
<div class="p-6 border-b border-gray-100 flex flex-wrap items-center justify-between gap-4">
<div class="flex items-center space-x-4">
<div class="relative">
<input class="pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-[#1890FF] w-64 text-sm" placeholder="搜索学号/姓名/班级" type="text" id="searchKeyword"/>
<iconify-icon class="absolute left-3 top-2.5 text-gray-400" icon="mdi:magnify"></iconify-icon>
</div>
<select class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#1890FF]" id="searchStatus">
<option value="">全部状态</option>
<option value="1">启用</option>
<option value="0">禁用</option>
</select>
</div>
<button class="bg-[#1890FF] text-white px-4 py-2 rounded-md text-sm font-medium flex items-center hover:bg-blue-600 transition-colors" onclick="openModal('add')">
<iconify-icon class="mr-1" icon="mdi:plus"></iconify-icon>
                            新增学生
                        </button>
</div>
<!-- 表格 -->
<div class="overflow-x-auto">
<table class="w-full text-left">
<thead>
<tr class="bg-gray-50 text-gray-500 text-sm">
<th class="px-6 py-4 font-medium">序号</th>
<th class="px-6 py-4 font-medium">学号</th>
<th class="px-6 py-4 font-medium">姓名</th>
<th class="px-6 py-4 font-medium">性别</th>
<th class="px-6 py-4 font-medium">班级</th>
<th class="px-6 py-4 font-medium">所学课程</th>
<th class="px-6 py-4 font-medium">手机号</th>
<th class="px-6 py-4 font-medium">状态</th>
<th class="px-6 py-4 font-medium">创建时间</th>
<th class="px-6 py-4 font-medium text-center">操作</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-100 text-sm" id="studentTableBody">
</tbody>
</table>
</div>
<!-- 分页 -->
<div class="p-6 border-t border-gray-100 flex items-center justify-between text-sm" id="paginationArea">
<span class="text-gray-500" id="paginationInfo">加载中...</span>
<div class="flex items-center space-x-2" id="paginationButtons">
</div>
</div>
</div>
</main>
</div>
<!-- 编辑模态框 -->
<div class="fixed inset-0 z-50 flex items-center justify-center hidden" id="modal">
<div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
<div class="relative bg-white rounded-lg shadow-2xl w-full max-w-lg overflow-hidden" style="max-height:90vh">
<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
<h3 class="text-lg font-bold text-gray-800" id="modalTitle">新增学生</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="closeModal()">
<iconify-icon class="text-xl" icon="mdi:close"></iconify-icon>
</button>
</div>
<div class="p-6 overflow-y-auto" style="max-height:calc(90vh - 60px)">
<form class="space-y-4" id="studentForm" onsubmit="submitForm(event)">
<input type="hidden" id="editId"/>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">学号 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none disabled:bg-gray-100" id="s_username" type="text" required/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="s_realName" type="text" required/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">性别 <span class="text-red-500">*</span></label>
<select class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="s_gender">
<option value="M">男</option>
<option value="F">女</option>
</select>
</div>
<div id="passwordField">
<label class="block text-sm font-medium text-gray-700 mb-1">初始密码</label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" placeholder="不填则默认为 123456" id="s_password" type="password"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">班级 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="s_className" type="text" required placeholder="例如：2024级1班"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="s_phone" type="text"/>
</div>
<!-- 课程分配区域 - 仅在编辑时显示 -->
<div id="courseAssignField" class="hidden">
<label class="block text-sm font-medium text-gray-700 mb-2">所学课程</label>
<div class="border border-gray-200 rounded-md p-3 max-h-40 overflow-y-auto space-y-1" id="courseCheckboxes">
</div>
</div>
<!-- 重置密码 - 仅在编辑时显示 -->
<div id="resetPasswordField" class="hidden pt-2 border-t border-gray-100">
<button class="text-sm text-orange-500 hover:text-orange-700 font-medium flex items-center" onclick="doResetPassword(event)" type="button">
<iconify-icon class="mr-1" icon="mdi:lock-reset"></iconify-icon>
                        重置密码为 123456
                    </button>
</div>
<div class="pt-4 flex justify-end space-x-3">
<button class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200" onclick="closeModal()" type="button">取消</button>
<button class="px-4 py-2 text-sm font-medium text-white bg-[#1890FF] rounded-md hover:bg-blue-600" type="submit">确定</button>
</div>
</form>
</div>
</div>
</div>
<script>
    var API_BASE = '/api';

    function apiGet(url, params) {
        var query = params ? '?' + new URLSearchParams(params).toString() : '';
        return fetch(API_BASE + url + query, { credentials: 'include' }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    function apiPost(url, data) {
        return fetch(API_BASE + url, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    function apiPut(url, data) {
        return fetch(API_BASE + url, { method: 'PUT', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    function apiDelete(url) {
        return fetch(API_BASE + url, { method: 'DELETE', credentials: 'include' }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    var currentPage = 1;
    var pageSize = 10;
    var totalPages = 1;
    var editingId = null;
    var allCourses = [];

    // 加载管理员姓名
    function loadAdminName() {
        apiGet('/auth/current-user').then(function(user) {
            var data = user.data || user;
            var name = data.realName || data.username;
            if (name) {
                document.getElementById('adminName').textContent = name;
            }
        }).catch(function() {});
    }

    // 加载所有课程
    function loadAllCourses() {
        apiGet('/courses').then(function(res) {
            allCourses = res.data || res || [];
            if (!Array.isArray(allCourses)) allCourses = [];
            loadStudentsCourses();
        }).catch(function() {});
    }

    // 加载学生列表
    function loadStudents() {
        var keyword = document.getElementById('searchKeyword').value;
        var status = document.getElementById('searchStatus').value;
        var params = { page: currentPage, pageSize: pageSize };
        if (keyword) params.keyword = keyword;
        if (status !== '') params.status = status;

        apiGet('/admin/students', params).then(function(res) {
            var data = res.data || res;
            var list = data.records || data.list || data || [];
            var total = data.total || 0;
            totalPages = Math.ceil(total / pageSize) || 1;
            renderTable(list);
            renderPagination(total);
            setTimeout(loadAllCourses, 100);
        }).catch(function(err) {
            console.error('加载学生列表失败:', err);
            document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="10" class="px-6 py-8 text-center text-gray-400">加载失败，请稍后重试</td></tr>';
        });
    }

    // 渲染表格
    function renderTable(list) {
        var tbody = document.getElementById('studentTableBody');
        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="px-6 py-8 text-center text-gray-400">暂无数据</td></tr>';
            return;
        }
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var s = list[i];
            var isActive = s.status === 1 || s.status === '1';
            var statusClass = isActive ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
            var statusText = isActive ? '启用' : '禁用';
            var toggleText = isActive ? '禁用' : '启用';
            var toggleClass = isActive ? 'text-red-500 hover:text-red-700' : 'text-green-500 hover:text-green-700';
            var genderText = s.gender === 'M' ? '男' : (s.gender === 'F' ? '女' : (s.gender || '--'));
            var rowClass = (i % 2 === 1) ? ' class="bg-gray-50/30"' : '';
            var createTime = s.createTime || s.createdAt || '';
            if (createTime && typeof createTime === 'string' && createTime.indexOf('T') !== -1) {
                createTime = createTime.replace('T', ' ');
            }

            html += '<tr' + rowClass + '>';
            html += '<td class="px-6 py-4">' + ((currentPage - 1) * pageSize + i + 1) + '</td>';
            html += '<td class="px-6 py-4 text-[#1890FF] font-medium">' + escapeHtml(s.username) + '</td>';
            html += '<td class="px-6 py-4">' + escapeHtml(s.realName) + '</td>';
            html += '<td class="px-6 py-4">' + escapeHtml(genderText) + '</td>';
            html += '<td class="px-6 py-4 text-gray-600">' + escapeHtml(s.className || '--') + '</td>';
            html += '<td class="px-6 py-4 text-gray-600 text-xs"><span id="courses-' + s.studentId + '">--</span></td>';
            html += '<td class="px-6 py-4 text-gray-600">' + escapeHtml(s.phone || '--') + '</td>';
            html += '<td class="px-6 py-4">';
            html += '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + statusClass + '">' + statusText + '</span>';
            html += '</td>';
            html += '<td class="px-6 py-4 text-gray-500 text-xs">' + escapeHtml(createTime || '--') + '</td>';
            html += '<td class="px-6 py-4 text-center">';
            html += '<div class="flex items-center justify-center space-x-3">';
            html += '<button class="text-blue-500 hover:text-blue-700" onclick="openEditModal(' + s.studentId + ')">编辑</button>';
            html += '<button class="' + toggleClass + '" onclick="toggleStatus(' + s.studentId + ', ' + (isActive ? 0 : 1) + ')">' + toggleText + '</button>';
            html += '<button class="text-red-500 hover:text-red-700" onclick="deleteStudent(' + s.studentId + ')">删除</button>';
            html += '</div>';
            html += '</td>';
            html += '</tr>';
        }
        tbody.innerHTML = html;
    }

    // 渲染分页
    function renderPagination(total) {
        document.getElementById('paginationInfo').textContent = '共 ' + total + ' 条记录，每页 ' + pageSize + ' 条';
        var buttonsHtml = '';

        buttonsHtml += '<button class="px-2 py-1 border border-gray-300 rounded hover:bg-gray-50" onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>';
        buttonsHtml += '<iconify-icon icon="mdi:chevron-left"></iconify-icon>';
        buttonsHtml += '</button>';

        var startPage = Math.max(1, currentPage - 2);
        var endPage = Math.min(totalPages, currentPage + 2);
        if (startPage > 1) {
            buttonsHtml += '<button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50" onclick="goToPage(1)">1</button>';
            if (startPage > 2) {
                buttonsHtml += '<span class="px-2">...</span>';
            }
        }
        for (var p = startPage; p <= endPage; p++) {
            if (p === currentPage) {
                buttonsHtml += '<button class="px-3 py-1 bg-[#1890FF] text-white rounded">' + p + '</button>';
            } else {
                buttonsHtml += '<button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50" onclick="goToPage(' + p + ')">' + p + '</button>';
            }
        }
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) {
                buttonsHtml += '<span class="px-2">...</span>';
            }
            buttonsHtml += '<button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50" onclick="goToPage(' + totalPages + ')">' + totalPages + '</button>';
        }

        buttonsHtml += '<button class="px-2 py-1 border border-gray-300 rounded hover:bg-gray-50" onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>';
        buttonsHtml += '<iconify-icon icon="mdi:chevron-right"></iconify-icon>';
        buttonsHtml += '</button>';

        document.getElementById('paginationButtons').innerHTML = buttonsHtml;
    }

    function goToPage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        loadStudents();
    }

    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    // 加载每位学生的课程标签
    function loadStudentsCourses() {
        var spans = document.querySelectorAll('[id^="courses-"]');
        spans.forEach(function(span) {
            var studentId = span.id.replace('courses-', '');
            apiGet('/admin/students/' + studentId + '/courses').then(function(res) {
                var list = (res.data || res) || [];
                if (!Array.isArray(list)) list = [];
                if (list.length === 0) {
                    span.textContent = '未分配';
                    span.className = 'text-gray-400 text-xs';
                } else {
                    var names = [];
                    for (var j = 0; j < list.length; j++) {
                        names.push(list[j].courseName || '');
                    }
                    span.textContent = names.join('、');
                    span.className = 'text-gray-600 text-xs';
                }
            }).catch(function() {});
        });
    }

    // 搜索功能
    var searchTimer = null;
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        });

        var userMenuTrigger = document.getElementById('userMenuTrigger');
        var userDropdown = document.getElementById('userDropdown');
        userMenuTrigger.addEventListener('click', function(e) {
            e.stopPropagation();
            userDropdown.classList.toggle('show');
        });
        document.addEventListener('click', function() {
            userDropdown.classList.remove('show');
        });

        loadAdminName();
        loadStudents();

        document.getElementById('searchKeyword').addEventListener('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() {
                currentPage = 1;
                loadStudents();
            }, 400);
        });

        document.getElementById('searchStatus').addEventListener('change', function() {
            currentPage = 1;
            loadStudents();
        });
    });

    // 打开新增模态框
    function openModal(type) {
        editingId = null;
        document.getElementById('editId').value = '';
        document.getElementById('modalTitle').innerText = '新增学生';
        document.getElementById('passwordField').classList.remove('hidden');
        document.getElementById('courseAssignField').classList.add('hidden');
        document.getElementById('resetPasswordField').classList.add('hidden');
        document.getElementById('s_username').value = '';
        document.getElementById('s_username').disabled = false;
        document.getElementById('s_realName').value = '';
        document.getElementById('s_gender').value = 'M';
        document.getElementById('s_password').value = '';
        document.getElementById('s_className').value = '';
        document.getElementById('s_phone').value = '';
        document.getElementById('modal').classList.remove('hidden');
    }

    // 打开编辑模态框
    function openEditModal(id) {
        editingId = id;
        apiGet('/admin/students/' + id).then(function(res) {
            var s = res.data || res;
            document.getElementById('editId').value = s.studentId;
            document.getElementById('modalTitle').innerText = '编辑学生信息';
            document.getElementById('passwordField').classList.add('hidden');
            document.getElementById('courseAssignField').classList.remove('hidden');
            document.getElementById('resetPasswordField').classList.remove('hidden');
            document.getElementById('s_username').value = s.username;
            document.getElementById('s_username').disabled = true;
            document.getElementById('s_realName').value = s.realName || '';
            document.getElementById('s_gender').value = s.gender === 'M' ? 'M' : 'F';
            document.getElementById('s_password').value = '';
            document.getElementById('s_className').value = s.className || '';
            document.getElementById('s_phone').value = s.phone || '';
            document.getElementById('modal').classList.remove('hidden');
            // 加载该学生的课程分配
            loadStudentCourseAssign(id);
        }).catch(function(err) {
            alert('获取学生信息失败');
        });
    }

    // 加载学生课程分配复选框
    function loadStudentCourseAssign(studentId) {
        apiGet('/admin/students/' + studentId + '/courses').then(function(res) {
            var assigned = res.data || res || [];
            if (!Array.isArray(assigned)) assigned = [];
            var assignedIds = {};
            for (var i = 0; i < assigned.length; i++) {
                assignedIds[assigned[i].courseId] = true;
            }
            renderCourseCheckboxes(assignedIds);
        }).catch(function() {
            renderCourseCheckboxes({});
        });
    }

    function renderCourseCheckboxes(assignedIds) {
        var container = document.getElementById('courseCheckboxes');
        if (allCourses.length === 0) {
            container.innerHTML = '<p class="text-gray-400 text-xs">暂无课程，请先在课程管理中添加</p>';
            return;
        }
        var html = '';
        for (var i = 0; i < allCourses.length; i++) {
            var c = allCourses[i];
            var checked = assignedIds[c.courseId] ? ' checked' : '';
            html += '<label class="flex items-center space-x-2 py-1 hover:bg-gray-50 cursor-pointer text-sm">';
            html += '<input type="checkbox" name="courseIds" value="' + c.courseId + '"' + checked + ' class="w-4 h-4 text-[#1890FF] rounded border-gray-300 focus:ring-[#1890FF]"/>';
            html += '<span class="text-gray-700">' + escapeHtml(c.courseName) + '</span>';
            html += '</label>';
        }
        container.innerHTML = html;
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    // 提交表单
    function submitForm(e) {
        e.preventDefault();
        var data = {
            username: document.getElementById('s_username').value.trim(),
            realName: document.getElementById('s_realName').value.trim(),
            gender: document.getElementById('s_gender').value,
            className: document.getElementById('s_className').value.trim(),
            phone: document.getElementById('s_phone').value.trim()
        };

        var password = document.getElementById('s_password').value.trim();
        if (password) {
            data.password = password;
        }

        var savePromise;
        if (editingId) {
            delete data.username;
            savePromise = apiPut('/admin/students/' + editingId, data);
        } else {
            savePromise = apiPost('/admin/students', data);
        }

        savePromise.then(function() {
            // 编辑模式下同时保存课程分配
            if (editingId) {
                var checkboxes = document.querySelectorAll('input[name="courseIds"]:checked');
                var courseIds = [];
                for (var i = 0; i < checkboxes.length; i++) {
                    courseIds.push(parseInt(checkboxes[i].value));
                }
                apiPut('/admin/students/' + editingId + '/courses', { courseIds: courseIds }).then(function() {
                    closeModal();
                    loadStudents();
                }).catch(function() {
                    closeModal();
                    loadStudents();
                });
            } else {
                closeModal();
                loadStudents();
            }
        }).catch(function(err) {
            alert('保存失败，请稍后重试');
        });
        return false;
    }

    // 切换状态
    function toggleStatus(id, newStatus) {
        if (!confirm('确定要' + (newStatus === 1 ? '启用' : '禁用') + '该学生账号吗？')) return;
        apiPut('/admin/students/' + id + '/status', { status: newStatus }).then(function() {
            loadStudents();
        }).catch(function(err) {
            alert('操作失败，请稍后重试');
        });
    }

    // 重置密码（在编辑弹窗中调用）
    function doResetPassword(event) {
        if (!editingId) return;
        if (!confirm('确定要重置该学生的密码吗？重置后密码将恢复为默认密码。')) return;
        apiPut('/admin/students/' + editingId + '/reset-password').then(function() {
            alert('密码重置成功');
        }).catch(function(err) {
            alert('重置失败，请稍后重试');
        });
    }

    // 删除学生
    function deleteStudent(id) {
        if (!confirm('确定要删除该学生账号吗？此操作将同时删除该学生的练习记录和测验记录，且不可恢复！')) return;
        apiDelete('/admin/students/' + id).then(function(res) {
            if (res.code !== 200) {
                alert('删除失败：' + (res.message || '未知错误'));
                return;
            }
            loadStudents();
        }).catch(function(err) {
            alert('删除失败，请稍后重试');
        });
    }
</script>
</body>
</html>
