<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>我的成绩 - 课程习题测验系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="iconify-icon.min.js"></script>
<style>
        body { background-color: #F0F2F5; }
        .nav-active { color: #1890FF; border-bottom: 2px solid #1890FF; }
                .user-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 6px 16px rgba(0,0,0,0.12); min-width: 140px; z-index: 50; display: none; }
        .user-dropdown.show { display: block; }
        .user-dropdown a { display: flex; align-items: center; padding: 10px 16px; font-size: 14px; color: #595959; text-decoration: none; transition: background 0.2s; }
        .user-dropdown a:hover { background: #f5f5f5; }
</style>
</head>
<body class="min-h-screen flex flex-col">
<header class="bg-white shadow-sm">
<div class="max-w-7xl mx-auto px-4 flex items-center h-16">
<div class="flex items-center mr-12">
<iconify-icon class="text-2xl text-[#1890FF] mr-2" icon="mdi:book-open-page-variant"></iconify-icon>
<span class="text-xl font-bold text-gray-800">学习系统</span>
</div>
<nav class="flex space-x-8 h-full">
<a class="flex items-center h-full px-2 text-gray-500 hover:text-[#1890FF] font-medium" href="student_dashboard.html">我的首页</a>
<a class="flex items-center h-full px-2 text-gray-500 hover:text-[#1890FF] font-medium" href="student_practice.html">抽题练习</a>
<a class="flex items-center h-full px-2 text-gray-500 hover:text-[#1890FF] font-medium" href="student_exam.html">参加测验</a>
<a class="flex items-center h-full px-2 nav-active font-medium" href="student_results.html">我的成绩</a>
</nav>
<div class="ml-auto relative">
<div class="flex items-center space-x-3 cursor-pointer" id="userMenuTrigger">
<div class="text-right">
<p class="text-sm font-medium text-gray-900" id="headerUserName">加载中...</p>
</div>
<div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold" id="headerAvatar">学</div>
<iconify-icon class="text-gray-400 text-sm" icon="mdi:chevron-down"></iconify-icon>
</div>
<div class="user-dropdown" id="userDropdown">
<a href="#" onclick="openSettingsModal(event)">
<iconify-icon class="mr-2" icon="mdi:cog"></iconify-icon>
设置
</a>
<a href="login.html">
<iconify-icon class="mr-2" icon="mdi:logout"></iconify-icon>
退出登录
</a>
</div>
</div>
</div>
</header>
<main class="max-w-7xl mx-auto px-4 py-8 w-full">
<!-- 统计卡片 -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
<p class="text-gray-400 text-sm">总测验次数</p>
<p class="text-3xl font-bold text-gray-800 mt-2" id="statTotalExams">-- 次</p>
</div>
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
<p class="text-gray-400 text-sm">平均分</p>
<p class="text-3xl font-bold text-[#1890FF] mt-2" id="statAvgScore">--</p>
</div>
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
<p class="text-gray-400 text-sm">最高分</p>
<p class="text-3xl font-bold text-green-500 mt-2" id="statMaxScore">--</p>
</div>
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
<div>
<p class="text-gray-400 text-sm">累计错题</p>
<p class="text-3xl font-bold text-red-500 mt-2" id="statWrongCount">-- 题</p>
</div>

</div>
</div>
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
<div class="p-6 border-b border-gray-50 flex items-center justify-between">
<h3 class="text-lg font-bold text-gray-800">成绩明细</h3>
<div class="flex space-x-2">
<button class="px-3 py-1 bg-blue-50 text-blue-600 text-xs rounded font-bold" id="filterAll" onclick="filterResults('all')">全部</button>
<button class="px-3 py-1 text-gray-400 text-xs rounded hover:bg-gray-50" id="filterMonth" onclick="filterResults('month')">本月</button>
</div>
</div>
<div class="overflow-x-auto">
<table class="w-full text-left">
<thead>
<tr class="bg-gray-50 text-gray-400 text-xs uppercase tracking-wider">
<th class="px-6 py-4 font-bold">测验名称</th>
<th class="px-6 py-4 font-bold">测验日期</th>
<th class="px-6 py-4 font-bold">得分</th>
<th class="px-6 py-4 font-bold">正确率</th>
<th class="px-6 py-4 font-bold">用时</th>
<th class="px-6 py-4 font-bold">排名</th>
<th class="px-6 py-4 font-bold">操作</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-50 text-sm text-gray-700" id="resultsTableBody">
<tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">加载中...</td></tr>
</tbody>
</table>
</div>
<div class="p-6 border-t border-gray-50 text-center" id="loadMoreRow">
<button class="text-gray-400 text-xs hover:text-gray-600" id="loadMoreBtn" onclick="loadMore()">加载更多记录...</button>
</div>
</div>
</main>

<!-- 成绩详情弹窗 -->
<div class="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center hidden" id="detailModal">
<div class="bg-white p-8 rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto mx-4">
<div class="flex items-center justify-between mb-6">
<h3 class="text-xl font-bold text-gray-800" id="detailTitle">成绩详情</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="closeDetail()">
<iconify-icon class="text-2xl" icon="mdi:close"></iconify-icon>
</button>
</div>
<div class="space-y-4" id="detailContent">
<p class="text-gray-400">加载中...</p>
</div>
</div>
</div>


<!-- 设置菜单 -->
<div class="fixed inset-0 z-50 flex items-center justify-center hidden" id="settingsModal">
<div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeSettingsModal()"></div>
<div class="relative bg-white rounded-lg shadow-2xl w-full max-w-xs overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
<h3 class="text-lg font-bold text-gray-800">设置</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="closeSettingsModal()">
<iconify-icon class="text-xl" icon="mdi:close"></iconify-icon>
</button>
</div>
<div class="p-2">
<a href="#" onclick="openPasswordModal(event)" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-50 text-sm text-gray-700 transition-colors">
<iconify-icon class="mr-3 text-lg text-gray-400" icon="mdi:lock-reset"></iconify-icon>
修改密码
<iconify-icon class="ml-auto text-gray-300" icon="mdi:chevron-right"></iconify-icon>
</a>
</div>
</div>
</div>

<!-- 修改密码模态框 -->
<div class="fixed inset-0 z-50 flex items-center justify-center hidden" id="passwordModal">
<div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closePasswordModal()"></div>
<div class="relative bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
<h3 class="text-lg font-bold text-gray-800">修改密码</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="closePasswordModal()">
<iconify-icon class="text-xl" icon="mdi:close"></iconify-icon>
</button>
</div>
<div class="p-6">
<form class="space-y-4" id="settingsForm" onsubmit="savePassword(event)">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">原密码 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="sp_oldPassword" type="password" required/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">新密码 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="sp_newPassword" type="password" required minlength="4"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">确认新密码 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="sp_confirmPassword" type="password" required/>
</div>
<div class="pt-4 flex justify-end space-x-3">
<button class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200" onclick="closePasswordModal()" type="button">取消</button>
<button class="px-4 py-2 text-sm font-medium text-white bg-[#1890FF] rounded-md hover:bg-blue-600" type="submit">确认修改</button>
</div>
</form>
</div>
</div>
</div>
<script>
var API_BASE = '/api';

function apiGet(url, params) {
    var query = params ? '?' + new URLSearchParams(params).toString() : '';
    return fetch(API_BASE + url + query, { credentials: 'include' }).then(function(res) {
        if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
        return res.json();
    });
}
function apiPost(url, data) {
    return fetch(API_BASE + url, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
        if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
        return res.json();
    });
}

var currentPage = 1;
var currentPageSize = 10;
var currentFilter = 'all';
var hasMore = true;

function formatDuration(seconds) {
    if (seconds == null) return '--';
    var m = Math.floor(seconds / 60);
    var s = seconds % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function loadResults() {
    var params = { page: currentPage, pageSize: currentPageSize };
    if (currentFilter === 'month') {
        params.filter = 'month';
    }

    apiGet('/student/results/exams', params).then(function(data) {
        data = data.data || data;
        var list = data.list || data.records || (Array.isArray(data) ? data : []);
        var total = data.total != null ? data.total : list.length;

        // Calculate stats from completed exams
        var completedExams = [];
        for (var i = 0; i < list.length; i++) {
            if (list[i].status === 1 && list[i].totalScore != null) {
                completedExams.push(list[i]);
            }
        }
        var examCount = completedExams.length;
        document.getElementById('statTotalExams').textContent = examCount + ' 次';
        if (examCount > 0) {
            var sumScore = 0, maxScore = 0;
            for (var i = 0; i < completedExams.length; i++) {
                var s = parseFloat(completedExams[i].totalScore) || 0;
                sumScore += s;
                if (s > maxScore) maxScore = s;
            }
            document.getElementById('statAvgScore').textContent = (sumScore / examCount).toFixed(1);
            document.getElementById('statMaxScore').textContent = maxScore;
        } else {
            document.getElementById('statAvgScore').textContent = '--';
            document.getElementById('statMaxScore').textContent = '--';
        }
        document.getElementById('statWrongCount').textContent = '-- 题';

        // Render table
        var tbody = document.getElementById('resultsTableBody');
        if (list.length === 0 && currentPage === 1) {
            tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">暂无成绩记录</td></tr>';
            document.getElementById('loadMoreRow').style.display = 'none';
            return;
        }

        var html = currentPage === 1 ? '' : tbody.innerHTML;

        for (var i = 0; i < list.length; i++) {
            var item = list[i];
            var recordId = item.id || item.examRecordId || item.recordId;
            var examName = item.paperName || item.examName || item.title || item.name || '测验';
            var examDate = item.submitTime || item.examDate || item.date || item.createTime || '';
            var score = item.totalScore != null ? item.totalScore : '--';
            var totalScore = item.paperTotalScore != null ? item.paperTotalScore : '100';
            var accuracy = '--';
            var duration = formatDuration(item.usedMinutes ? item.usedMinutes * 60 : (item.paperDuration ? item.paperDuration * 60 : (item.duration || item.elapsedSeconds || item.timeUsed)));
            var rank = item.rank != null ? item.rank : '--';
            var totalStudents = item.totalStudents != null ? '/' + item.totalStudents : '';
            var rankDisplay = rank !== '--' ? rank + ' ' + totalStudents : '--';

            html += '<tr>';
            html += '<td class="px-6 py-4 font-bold">' + examName + '</td>';
            html += '<td class="px-6 py-4">' + examDate + '</td>';
            html += '<td class="px-6 py-4"><span class="text-blue-600 font-bold">' + score + '</span> / ' + totalScore + '</td>';
            html += '<td class="px-6 py-4">' + (accuracy !== '--' ? accuracy + '%' : '--') + '</td>';
            html += '<td class="px-6 py-4">' + duration + '</td>';
            html += '<td class="px-6 py-4">' + rankDisplay + '</td>';
            html += '<td class="px-6 py-4"><button class="text-[#1890FF] font-medium hover:underline" onclick="viewDetail(' + recordId + ')">题目回顾</button></td>';
            html += '</tr>';
        }

        tbody.innerHTML = html;

        // Handle pagination
        if (list.length < currentPageSize) {
            hasMore = false;
            document.getElementById('loadMoreRow').style.display = 'none';
        } else {
            hasMore = true;
            document.getElementById('loadMoreRow').style.display = '';
            document.getElementById('loadMoreBtn').textContent = '加载更多记录...';
        }
    }).catch(function(err) {
        console.error('Failed to load results:', err);
        document.getElementById('resultsTableBody').innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-red-400">加载失败，请刷新重试</td></tr>';
    });
}

function loadMore() {
    if (!hasMore) return;
    currentPage++;
    document.getElementById('loadMoreBtn').textContent = '加载中...';
    loadResults();
}

function filterResults(type) {
    currentFilter = type;
    currentPage = 1;
    hasMore = true;

    // Update filter button styles
    document.getElementById('filterAll').className = type === 'all'
        ? 'px-3 py-1 bg-blue-50 text-blue-600 text-xs rounded font-bold'
        : 'px-3 py-1 text-gray-400 text-xs rounded hover:bg-gray-50';
    document.getElementById('filterMonth').className = type === 'month'
        ? 'px-3 py-1 bg-blue-50 text-blue-600 text-xs rounded font-bold'
        : 'px-3 py-1 text-gray-400 text-xs rounded hover:bg-gray-50';

    document.getElementById('resultsTableBody').innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">加载中...</td></tr>';
    loadResults();
}

function viewDetail(recordId) {
    document.getElementById('detailModal').classList.remove('hidden');
    document.getElementById('detailTitle').textContent = '成绩详情';
    document.getElementById('detailContent').innerHTML = '<p class="text-gray-400 text-center py-8">加载中...</p>';

    apiGet('/student/results/exams/' + recordId).then(function(data) {
        data = data.data || data;
        var questions = data.answers || data.questions || data.detail || [];
        var html = '';

        // Summary
        html += '<div class="bg-gray-50 p-4 rounded-lg mb-4">';
        html += '<div class="flex justify-around text-center">';
        html += '<div><p class="text-xs text-gray-400">得分</p><p class="text-lg font-bold text-blue-500">' + (data.totalScore != null ? data.totalScore : '--') + ' / ' + (data.paperTotalScore || '100') + '</p></div>';
        html += '<div><p class="text-xs text-gray-400">正确率</p><p class="text-lg font-bold text-green-500">' + (data.correctCount != null && data.questionCount ? Math.round((data.correctCount / data.questionCount) * 100) + '%' : '--') + '</p></div>';
        html += '<div><p class="text-xs text-gray-400">排名</p><p class="text-lg font-bold text-gray-800">' + (data.rank != null ? data.rank : '--') + '</p></div>';
        html += '</div></div>';

        if (questions.length === 0) {
            html += '<p class="text-gray-400 text-center py-4">暂无题目详情</p>';
        } else {
            html += '<h4 class="font-bold text-gray-700 mb-3">答题详情</h4>';
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                var isCorrect = q.correct || q.isCorrect;
                var statusColor = isCorrect ? 'text-green-500' : 'text-red-500';
                var statusIcon = isCorrect ? 'mdi:check-circle' : 'mdi:close-circle';
                var statusBg = isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200';
                var studentAnswer = q.studentAnswer || q.myAnswer || '未作答';
                var correctAnswer = q.correctAnswer || q.answer || '';

                html += '<div class="p-4 border rounded-lg mb-3 ' + statusBg + '">';
                html += '<div class="flex items-start justify-between">';
                html += '<div class="flex-1">';
                html += '<p class="text-sm font-bold text-gray-800">' + (i + 1) + '. ' + (q.content || q.title || '') + '</p>';
                html += '<p class="text-xs mt-2"><span class="text-gray-500">你的答案：</span><span class="' + (isCorrect ? 'text-green-600' : 'text-red-600') + ' font-medium">' + studentAnswer + '</span></p>';
                if (!isCorrect && correctAnswer) {
                    html += '<p class="text-xs mt-1"><span class="text-gray-500">正确答案：</span><span class="text-green-600 font-medium">' + correctAnswer + '</span></p>';
                }
                html += '</div>';
                html += '<iconify-icon class="text-xl ' + statusColor + ' flex-shrink-0" icon="' + statusIcon + '"></iconify-icon>';
                html += '</div></div>';
            }
        }

        document.getElementById('detailContent').innerHTML = html;
    }).catch(function(err) {
        console.error('Failed to load detail:', err);
        document.getElementById('detailContent').innerHTML = '<p class="text-red-400 text-center py-8">加载失败</p>';
    });
}

function closeDetail() {
    document.getElementById('detailModal').classList.add('hidden');
}

// Check URL params for direct detail view
function checkUrlParams() {
    var params = new URLSearchParams(window.location.search);
    var recordId = params.get('recordId');
    if (recordId) {
        viewDetail(recordId);
    }
}

// Initialize
loadResults();
checkUrlParams();

		// User dropdown
		var userMenuTrigger = document.getElementById('userMenuTrigger');
		var userDropdown = document.getElementById('userDropdown');
		if (userMenuTrigger) {
			userMenuTrigger.addEventListener('click', function(e) {
				e.stopPropagation();
				userDropdown.classList.toggle('show');
			});
		}
		document.addEventListener('click', function() {
			if (userDropdown) userDropdown.classList.remove('show');
		});
		// Load current user
		apiGet('/auth/current-user').then(function(res) {
			var user = res.data || res;
			if (user && user.realName) {
				document.getElementById('headerUserName').textContent = user.realName;
				document.getElementById('headerAvatar').textContent = user.realName.charAt(0);
			}
		}).catch(function() {});

		// 设置菜单
		function openSettingsModal(event) {
			if (event) event.preventDefault();
			document.getElementById('settingsModal').classList.remove('hidden');
		}
		function closeSettingsModal() {
			document.getElementById('settingsModal').classList.add('hidden');
		}
		// 修改密码
		function openPasswordModal(event) {
			if (event) event.preventDefault();
			closeSettingsModal();
			document.getElementById('passwordModal').classList.remove('hidden');
		}
		function closePasswordModal() {
			document.getElementById('passwordModal').classList.add('hidden');
			document.getElementById('settingsForm').reset();
		}
		function savePassword(event) {
			event.preventDefault();
			var oldPwd = document.getElementById('sp_oldPassword').value.trim();
			var newPwd = document.getElementById('sp_newPassword').value.trim();
			var confirmPwd = document.getElementById('sp_confirmPassword').value.trim();
			if (!oldPwd || !newPwd || !confirmPwd) { alert('请填写所有字段'); return; }
			if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return; }
			if (newPwd.length < 4) { alert('新密码长度至少4位'); return; }
			fetch(API_BASE + '/auth/change-password', {
				method: 'PUT',
				headers: {'Content-Type': 'application/json'},
				credentials: 'include',
				body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
			}).then(function(res) { return res.json(); }).then(function(res) {
				if (res.code !== 200) { alert('修改失败：' + (res.message || '未知错误')); return; }
				alert('密码修改成功，请重新登录');
				window.location.href = 'login.html';
			}).catch(function() { alert('修改失败，请稍后重试'); });
			return false;
		}
</script>
</body>
</html>
