<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>老师工作台 - 课程习题测验系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="iconify-icon.min.js"></script>

<style>
        body { background-color: #F0F2F5; }
        .sidebar { background-color: #001529; }
        .sidebar-item { color: rgba(255, 255, 255, 0.65); transition: all 0.3s; }
        .sidebar-item:hover { color: #fff; background-color: rgba(24, 144, 255, 0.1); }
        .sidebar-item.active { color: #fff; background-color: #1890FF; }
        .user-dropdown { position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff; border-radius: 8px; box-shadow: 0 6px 16px rgba(0,0,0,0.12); min-width: 140px; z-index: 50; display: none; }
        .user-dropdown.show { display: block; }
        .user-dropdown a { display: flex; align-items: center; padding: 10px 16px; font-size: 14px; color: #595959; text-decoration: none; transition: background 0.2s; }
        .user-dropdown a:hover { background: #f5f5f5; }

</head>
<body class="flex h-screen overflow-hidden">
<!-- 侧边栏 -->

<div class="h-16 flex items-center px-6 text-white text-xl font-bold border-b border-gray-800">
<iconify-icon class="mr-2 text-2xl text-blue-400" icon="mdi:school-outline"></iconify-icon>
            教学管理
        </div>
<nav class="flex-1 py-4">
<a class="sidebar-item active flex items-center px-6 py-4" href="teacher_dashboard.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:home"></iconify-icon>
                首页
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="teacher_questions.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:file-question-outline"></iconify-icon>
                习题管理
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="teacher_exams.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:clipboard-text-outline"></iconify-icon>
                试卷管理
            </a>
<a class="sidebar-item flex items-center px-6 py-4" href="teacher_students.html">
<iconify-icon class="mr-3 text-lg" icon="mdi:account-group-outline"></iconify-icon>
                学生情况
            </a>
</nav>

</div>
<!-- 主内容 -->
<div class="flex-1 flex flex-col overflow-hidden">
<header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
<div class="flex items-center space-x-2 text-sm text-gray-500">
<span>教学管理</span>
<span>/</span>
<span class="text-gray-900 font-medium">首页看板</span>
</div>
<div class="relative">
<div class="flex items-center space-x-3 cursor-pointer" id="userMenuTrigger">
<div class="text-right">
<p class="text-sm font-medium text-gray-900" id="headerUserName">加载中...</p>
<p class="text-xs text-gray-500" id="headerUserDept"></p>
</div>
<div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold" id="headerAvatar">教</div>
<iconify-icon class="text-gray-400 text-sm" icon="mdi:chevron-down"></iconify-icon>
</div>
<div class="user-dropdown" id="userDropdown">
<a href="#" onclick="openSettingsModal(event)">
<iconify-icon class="mr-2" icon="mdi:cog"></iconify-icon>
                                    设置
                                </a>
<a href="login.html">
<iconify-icon class="mr-2" icon="mdi:logout"></iconify-icon>
                                    退出登录
                                </a>
</div>
</div>
</header>
<main class="flex-1 overflow-y-auto p-8">
<!-- 数据卡片 -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative overflow-hidden group">
<div class="absolute right-[-10px] top-[-10px] text-6xl text-blue-50 opacity-10 group-hover:scale-110 transition-transform">
<iconify-icon icon="mdi:bookshelf"></iconify-icon>
</div>
<p class="text-gray-500 text-sm">题库总数</p>
<p class="text-3xl font-bold text-gray-800 mt-2" id="kpiQuestionCount">--</p>
<p class="text-xs text-blue-600 mt-2 flex items-center">
<iconify-icon class="mr-1" icon="mdi:arrow-up"></iconify-icon>
                        本月新增 <span id="kpiNewQuestions">--</span> 题
                    </p>
</div>
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative overflow-hidden group">
<div class="absolute right-[-10px] top-[-10px] text-6xl text-purple-50 opacity-10 group-hover:scale-110 transition-transform">
<iconify-icon icon="mdi:file-document-edit"></iconify-icon>
</div>
<p class="text-gray-500 text-sm">试卷总数</p>
<p class="text-3xl font-bold text-gray-800 mt-2" id="kpiPaperCount">--</p>
<p class="text-xs text-purple-600 mt-2" id="kpiPaperSub"></p>
</div>
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative overflow-hidden group">
<div class="absolute right-[-10px] top-[-10px] text-6xl text-green-50 opacity-10 group-hover:scale-110 transition-transform">
<iconify-icon icon="mdi:play-circle-outline"></iconify-icon>
</div>
<p class="text-gray-500 text-sm">已发布测验</p>
<p class="text-3xl font-bold text-gray-800 mt-2" id="kpiPublishedCount">--</p>
</div>
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative overflow-hidden group">
<div class="absolute right-[-10px] top-[-10px] text-6xl text-orange-50 opacity-10 group-hover:scale-110 transition-transform">
<iconify-icon icon="mdi:account-group"></iconify-icon>
</div>
<p class="text-gray-500 text-sm">授课学生数</p>
<p class="text-3xl font-bold text-gray-800 mt-2" id="kpiStudentCount">--</p>
</div>
</div>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<!-- 左侧：成绩概览 -->
<div class="lg:col-span-2 space-y-8">
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
<h3 class="text-lg font-bold text-gray-800 mb-6">待批阅简答题</h3>
<div class="overflow-x-auto">
<table class="w-full text-left text-sm">
<thead>
<tr class="text-gray-400 border-b border-gray-100">
<th class="pb-3 font-medium">试卷名称</th>
<th class="pb-3 font-medium">学生</th>
<th class="pb-3 font-medium">提交时间</th>
<th class="pb-3 font-medium">操作</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-50" id="reviewTbody">
</tbody>
</table>
</div>
<p class="text-center text-sm text-gray-400 py-4 hidden" id="reviewEmpty">暂无待批阅的简答题</p>
</div>
</div>
<!-- 右侧：最近发布试卷 -->
<div class="space-y-6">
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
<div class="flex items-center justify-between mb-6">
<h3 class="text-lg font-bold text-gray-800">正在进行的测验</h3>
<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
</div>
<div class="space-y-4" id="activeExamsList">
</div>
<p class="text-center text-sm text-gray-400 py-4 hidden" id="activeExamsEmpty">暂无正在进行的测验</p>
<a href="teacher_exams.html" class="block w-full mt-6 py-2 border border-gray-200 text-gray-600 text-sm rounded text-center hover:bg-gray-50 transition-colors">管理所有测验</a>
</div>
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
<h3 class="text-lg font-bold text-gray-800 mb-4">快捷操作</h3>
<div class="grid grid-cols-2 gap-4">
<a class="p-4 bg-gray-50 rounded-lg hover:shadow-md transition-all text-center" href="teacher_questions.html">
<iconify-icon class="text-2xl text-blue-500 mb-2" icon="mdi:plus-circle"></iconify-icon>
<p class="text-sm font-medium">新增题目</p>
</a>
<a class="p-4 bg-gray-50 rounded-lg hover:shadow-md transition-all text-center" href="teacher_exams.html">
<iconify-icon class="text-2xl text-purple-500 mb-2" icon="mdi:file-plus"></iconify-icon>
<p class="text-sm font-medium">创建试卷</p>
</a>
</div>
</div>
</div>
</div>
</main>






</div>
<!-- 设置菜单 -->
<div class="fixed inset-0 z-50 flex items-center justify-center hidden" id="settingsModal">
<div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeSettingsModal()"></div>
<div class="relative bg-white rounded-lg shadow-2xl w-full max-w-xs overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
<h3 class="text-lg font-bold text-gray-800">设置</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="closeSettingsModal()">
<iconify-icon class="text-xl" icon="mdi:close"></iconify-icon>
</button>
</div>
<div class="p-2">
<a href="#" onclick="openPasswordModal(event)" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-50 text-sm text-gray-700 transition-colors">
<iconify-icon class="mr-3 text-lg text-gray-400" icon="mdi:lock-reset"></iconify-icon>
修改密码
<iconify-icon class="ml-auto text-gray-300" icon="mdi:chevron-right"></iconify-icon>
</a>
</div>
</div>
</div>

<!-- 修改密码模态框 -->
<div class="fixed inset-0 z-50 flex items-center justify-center hidden" id="passwordModal">
<div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closePasswordModal()"></div>
<div class="relative bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
<h3 class="text-lg font-bold text-gray-800">修改密码</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="closePasswordModal()">
<iconify-icon class="text-xl" icon="mdi:close"></iconify-icon>
</button>
</div>
<div class="p-6">
<form class="space-y-4" id="settingsForm" onsubmit="savePassword(event)">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">原密码 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="sp_oldPassword" type="password" required/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">新密码 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="sp_newPassword" type="password" required minlength="4"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">确认新密码 <span class="text-red-500">*</span></label>
<input class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-[#1890FF] outline-none" id="sp_confirmPassword" type="password" required/>
</div>
<div class="pt-4 flex justify-end space-x-3">
<button class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200" onclick="closePasswordModal()" type="button">取消</button>
<button class="px-4 py-2 text-sm font-medium text-white bg-[#1890FF] rounded-md hover:bg-blue-600" type="submit">确认修改</button>
</div>
</form>
</div>
</div>
</div>
<script>
    var API_BASE = '/api';

    function apiGet(url, params) {
        var query = params ? '?' + new URLSearchParams(params).toString() : '';
        return fetch(API_BASE + url + query, { credentials: 'include' }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }
    function apiPost(url, data) {
        return fetch(API_BASE + url, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }
    function apiPut(url, data) {
        return fetch(API_BASE + url, { method: 'PUT', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }
    function apiDelete(url) {
        return fetch(API_BASE + url, { method: 'DELETE', credentials: 'include' }).then(function(res) {
            if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
            return res.json();
        });
    }

    function loadCurrentUser() {
        apiGet('/auth/current-user').then(function(user) {
            var u = user.data || user;
            var name = u.realName || u.username || '老师';
            document.getElementById('headerUserName').textContent = name + ' 老师';
            document.getElementById('headerUserDept').textContent = (u.college || '') + (u.major ? ' · ' + u.major : '');
            document.getElementById('headerAvatar').textContent = name.charAt(0);
        }).catch(function(err) {
            console.error('Failed to load user:', err);
        });
    }

    function loadDashboardStats() {
        apiGet('/teacher/dashboard/stats').then(function(stats) {
            stats = stats.data || stats;
            document.getElementById('kpiQuestionCount').textContent = (stats.questionCount != null ? stats.questionCount.toLocaleString() : '--');
            document.getElementById('kpiPaperCount').textContent = (stats.paperCount != null ? stats.paperCount : '--');
            document.getElementById('kpiPublishedCount').textContent = (stats.publishedPaperCount != null ? stats.publishedPaperCount : '--');
            document.getElementById('kpiStudentCount').textContent = (stats.studentCount != null ? stats.studentCount : '--');

            document.getElementById('kpiNewQuestions').textContent = stats.newQuestionsThisMonth || 0;
            var draftCount = (stats.paperCount || 0) - (stats.publishedPaperCount || 0);
            document.getElementById('kpiPaperSub').textContent = '包含 ' + draftCount + ' 份草稿';
        }).catch(function(err) {
            console.error('Failed to load stats:', err);
        });
    }

    function loadActiveExams() {
        apiGet('/teacher/papers', { status: 1, pageSize: 5 }).then(function(data) {
            data = data.data || data;
            var list = data.records || data.list || [];
            var container = document.getElementById('activeExamsList');
            var empty = document.getElementById('activeExamsEmpty');
            if (list.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            var html = '';
            for (var i = 0; i < list.length; i++) {
                var paper = list[i];
                html += '<div class="p-4 bg-blue-50 rounded-lg border border-blue-100">';
                html += '<div class="flex justify-between items-start mb-2">';
                html += '<h4 class="font-bold text-blue-900">' + escapeHtml(paper.paperName || paper.name || '') + '</h4>';
                html += '<span class="text-xs bg-blue-200 text-blue-800 px-2 py-0.5 rounded">进行中</span>';
                html += '</div>';
                html += '<div class="flex justify-between text-xs text-blue-700 mt-3">';
                html += '<span>已提交: ' + (paper.submittedCount || 0) + ' / ' + (paper.totalStudentCount || 0) + '</span>';
                html += '</div>';
                html += '<div class="w-full bg-blue-200 h-1.5 rounded-full mt-2 overflow-hidden">';
                var pct = paper.totalStudentCount > 0 ? Math.round(paper.submittedCount / paper.totalStudentCount * 100) : 0;
                html += '<div class="bg-blue-600 h-full" style="width: ' + pct + '%"></div>';
                html += '</div></div>';
            }
            container.innerHTML = html;
        }).catch(function(err) {
            console.error('Failed to load active exams:', err);
        });
    }

    function loadPendingReviews() {
        apiGet('/teacher/questions', { questionType: 'SUBJECTIVE', pageSize: 5 }).then(function(data) {
            var tbody = document.getElementById('reviewTbody');
            var empty = document.getElementById('reviewEmpty');
            // Pending reviews would come from a grading endpoint - keeping this section prepared
            // For now show empty state
            empty.classList.remove('hidden');
        }).catch(function(err) {
            console.error('Failed to load reviews:', err);
            var empty = document.getElementById('reviewEmpty');
            empty.classList.remove('hidden');
        });
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadCurrentUser();
        loadDashboardStats();
        loadActiveExams();
        loadPendingReviews();
    });

    var userMenuTrigger = document.getElementById('userMenuTrigger');
    var userDropdown = document.getElementById('userDropdown');
    userMenuTrigger.addEventListener('click', function(e) {
        e.stopPropagation();
        userDropdown.classList.toggle('show');
    });
    document.addEventListener('click', function() {
        userDropdown.classList.remove('show');
    });

    // 设置菜单
    function openSettingsModal(event) {
        if (event) event.preventDefault();
        document.getElementById('settingsModal').classList.remove('hidden');
    }
    function closeSettingsModal() {
        document.getElementById('settingsModal').classList.add('hidden');
    }
    // 修改密码
    function openPasswordModal(event) {
        if (event) event.preventDefault();
        closeSettingsModal();
        document.getElementById('passwordModal').classList.remove('hidden');
    }
    function closePasswordModal() {
        document.getElementById('passwordModal').classList.add('hidden');
        document.getElementById('settingsForm').reset();
    }
    function savePassword(event) {
        event.preventDefault();
        var oldPwd = document.getElementById('sp_oldPassword').value.trim();
        var newPwd = document.getElementById('sp_newPassword').value.trim();
        var confirmPwd = document.getElementById('sp_confirmPassword').value.trim();
        if (!oldPwd || !newPwd || !confirmPwd) { alert('请填写所有字段'); return; }
        if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return; }
        if (newPwd.length < 4) { alert('新密码长度至少4位'); return; }
        fetch(API_BASE + '/auth/change-password', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
        }).then(function(res) { return res.json(); }).then(function(res) {
            if (res.code !== 200) { alert('修改失败：' + (res.message || '未知错误')); return; }
            alert('密码修改成功，请重新登录');
            window.location.href = 'login.html';
        }).catch(function() { alert('修改失败，请稍后重试'); });
        return false;
    }

</script>
</body>
</html>
