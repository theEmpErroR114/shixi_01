<script>
var API_BASE = '/api';

function apiGet(url, params) {
    var query = params ? '?' + new URLSearchParams(params).toString() : '';
    return fetch(API_BASE + url + query, { credentials: 'include' }).then(function(res) {
        if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
        return res.json();
    });
}
function apiPost(url, data) {
    return fetch(API_BASE + url, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
        if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
        return res.json();
    });
}

// Exam state
var examQuestions = [];
var examAnswers = {};        // questionId -> selectedAnswer
var examRecordId = null;
var examCurrentIndex = 0;
var examTimerInterval = null;
var examTotalSeconds = 0;
var examRemainingSeconds = 0;
var examStartTime = null;

function getOptionLabel(index) {
    return String.fromCharCode(65 + index);
}

function getTypeName(type) {
    if (type == 1) return '单选题';
    if (type == 2) return '多选题';
    if (type == 3) return '判断题';
    if (type == 4) return '填空题';
    if (type == 5) return '简答题';
    return '单选题';
}

function formatTime(seconds) {
    if (seconds < 0) seconds = 0;
    var h = Math.floor(seconds / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    var s = seconds % 60;
    if (h > 0) {
        return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

// Load available exams
function formatDateDisplay(dateVal) {
        if (!dateVal) return '';
        var d;
        if (Array.isArray(dateVal)) {
            d = new Date(dateVal[0], dateVal[1] - 1, dateVal[2], dateVal[3] || 0, dateVal[4] || 0);
        } else {
            d = new Date(dateVal);
        }
        if (isNaN(d.getTime())) return '';
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
               String(d.getHours()).padStart(2, '0') + ':' +
               String(d.getMinutes()).padStart(2, '0');
    }

    function loadAvailableExams() {
    apiGet('/student/exams/available').then(function(data) {
        data = data.data || data;
        var exams = Array.isArray(data) ? data : (data && data.list ? data.list : []);
        var container = document.getElementById('examListContainer');
        if (exams.length === 0) {
            container.innerHTML = '<p class="text-gray-400 text-center py-12">暂无可用测验</p>';
            return;
        }
        var html = '';
        for (var i = 0; i < exams.length; i++) {
            var exam = exams[i];
            var isActive = true; // 后端已过滤：仅返回已发布、日期有效、未提交的试卷
            var opacityClass = isActive ? '' : 'opacity-75';
            var statusClass = isActive ? 'text-red-500 font-medium' : 'text-green-600';
            var statusText = isActive ? (exam.statusText || '进行中') : (exam.statusText || '已完成');
            var btnHtml = '';
            if (isActive) {
                btnHtml = '<button class="px-6 py-2 bg-[#1890FF] text-white rounded-md font-bold hover:bg-blue-600" onclick="enterExam(' + (exam.paperId || exam.id) + ')">进入测验</button>';
            } else if (exam.hasResult || exam.score != null) {
                btnHtml = '<button class="px-6 py-2 border border-gray-200 text-gray-500 rounded-md font-medium hover:bg-gray-50" onclick="viewExamResult(' + (exam.examRecordId || exam.recordId || exam.id) + ')">查看解析</button>';
            } else {
                btnHtml = '<span class="text-gray-400 text-sm">已结束</span>';
            }

            var iconColor = isActive ? 'red' : 'gray';
            var iconName = isActive ? 'mdi:clock-fast' : 'mdi:checkbox-marked-circle-outline';

            html += '<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden ' + opacityClass + '">';
            html += '<div class="p-6 flex items-center justify-between">';
            html += '<div class="flex items-center">';
            html += '<div class="w-12 h-12 rounded-lg bg-' + iconColor + '-50 flex items-center justify-center text-' + iconColor + '-500 mr-4">';
            html += '<iconify-icon class="text-3xl" icon="' + iconName + '"></iconify-icon>';
            html += '</div>';
            html += '<div>';
            html += '<h3 class="text-lg font-bold text-gray-800">' + (exam.paperName || exam.title || exam.name || '测验') + '</h3>';
            html += '<div class="flex items-center space-x-4 mt-1 text-sm text-gray-400">';
            html += '<span>时长: ' + (exam.duration || exam.durationMinutes || '?') + ' 分钟</span>';
                    html += '<span>题目: ' + (exam.questionCount || exam.totalQuestions || '?') + ' 题</span>';
                    if (exam.startDate) { html += '<span>开始: ' + formatDateDisplay(exam.startDate) + '</span>'; }
                    if (exam.endDate) { html += '<span>截止: ' + formatDateDisplay(exam.endDate) + '</span>'; }
            if (exam.score != null) {
                html += '<span>分数: ' + exam.score + ' 分</span>';
            }
            html += '<span class="' + statusClass + '">' + statusText + '</span>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
            html += btnHtml;
            html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }).catch(function(err) {
        console.error('Failed to load exams:', err);
        document.getElementById('examListContainer').innerHTML = '<p class="text-red-400 text-center py-12">加载失败，请刷新重试</p>';
    });
}

function viewExamResult(recordId) {
    window.location.href = 'student_results.html?recordId=' + recordId;
}

function enterExam(paperId) {
    // Start exam
    apiPost('/student/exams/' + paperId + '/start').then(function(data) {
        data = data.data || data;
        examRecordId = data.examRecordId || data.id || data.recordId;
        if (!examRecordId) {
            alert('开始测验失败');
            return;
        }
        // Fetch exam detail
        loadExamDetail();
    }).catch(function(err) {
        console.error('Failed to start exam:', err);
        alert('开始测验失败，请重试');
    });
}

function loadExamDetail() {
    apiGet('/student/exams/' + examRecordId + '/detail').then(function(data) {
        data = data.data || data;
        examQuestions = Array.isArray(data) ? data : (data.questions || data.list || []);
        if (examQuestions.length === 0) {
            alert('题目加载失败');
            return;
        }

        // Set duration
        examTotalSeconds = (data.duration || data.durationMinutes || 60) * 60;
        examRemainingSeconds = examTotalSeconds;
        examCurrentIndex = 0;
        examAnswers = {};
        examStartTime = new Date();

        // Show exam interface
        document.getElementById('examListPage').style.display = 'none';
        document.getElementById('examInterface').classList.remove('hidden');
        document.getElementById('examTitle').textContent = data.title || data.examName || '测验';

        // Render answer card and first question
        renderExamAnswerCard();
        renderExamQuestion();
        startExamTimer();
    }).catch(function(err) {
        console.error('Failed to load exam detail:', err);
        alert('加载试卷详情失败');
    });
}

function renderExamAnswerCard() {
    var grid = document.getElementById('examAnswerCardGrid');
    document.getElementById('answeredCount').textContent = '已答 ' + Object.keys(examAnswers).length + '/' + examQuestions.length;
    var html = '';
    for (var i = 0; i < examQuestions.length; i++) {
        var q = examQuestions[i];
        var qid = q.id || q.questionId;
        var isAnswered = examAnswers[qid] != null;
        var isCurrent = i === examCurrentIndex;
        var cls = 'w-10 h-10 rounded border flex items-center justify-center font-bold text-sm cursor-pointer ';
        if (isCurrent && isAnswered) {
            cls += 'border-blue-500 bg-blue-500 text-white';
        } else if (isCurrent) {
            cls += 'border-blue-500 bg-blue-50 text-blue-600';
        } else if (isAnswered) {
            cls += 'border-blue-500 bg-blue-50 text-blue-600';
        } else {
            cls += 'border-gray-200 text-gray-400';
        }
        html += '<div class="' + cls + '" onclick="examJumpToQuestion(' + i + ')">' + (i + 1) + '</div>';
    }
    grid.innerHTML = html;
}

function renderExamQuestion() {
    var q = examQuestions[examCurrentIndex];
    if (!q) return;

    var qid = q.id || q.questionId;
    var typeName = getTypeName(q.questionType || q.type);
    document.getElementById('examQuestionLabel').textContent = typeName + ' (' + (examCurrentIndex + 1) + '/' + examQuestions.length + ')';
    document.getElementById('examQuestionContent').textContent = (examCurrentIndex + 1) + '. ' + (q.content || q.title || '');

    // Navigation buttons
    document.getElementById('examPrevBtn').style.visibility = examCurrentIndex === 0 ? 'hidden' : 'visible';
    document.getElementById('examNextBtn').textContent = examCurrentIndex === examQuestions.length - 1 ? '最后一题' : '下一题';

    // Render options
    var options = q.options || [];
    var container = document.getElementById('examOptionsContainer');
    var html = '';
    var selectedAnswer = examAnswers[qid] || '';
    var qType = q.questionType || q.type || 1;

    // Text input for fill-blank (4) and short-answer (5)
    if (qType == 4 || qType == 5) {
        html += '<textarea class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none" rows="' + (qType == 5 ? '5' : '2') + '" id="examTextAnswer" oninput="examSaveTextAnswer()">' + (selectedAnswer || '') + '</textarea>';
    } else if (qType == 2) {
        // Multi-choice: checkboxes
        var selectedLabels = selectedAnswer ? selectedAnswer.split(',') : [];
        for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            var label = opt.optionLabel || getOptionLabel(i);
            var content = opt.optionContent || opt.text || '';
            var isSelected = selectedLabels.indexOf(label) !== -1;
            var checkedAttr = isSelected ? ' checked' : '';
            html += '<label class="flex items-center p-4 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors' + (isSelected ? ' border-[#1890FF] bg-blue-50' : '') + '">';
            html += '<input class="w-4 h-4 text-[#1890FF] mr-4" name="examQ" type="checkbox" value="' + label + '"' + checkedAttr + ' onchange="examToggleMulti(\'' + label + '\')"/>';
            html += '<span class="font-medium text-gray-700">' + label + '. ' + content + '</span>';
            html += '</label>';
        }
    } else {
        // Single-choice (type 1, 3): radio buttons
        for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            var label = opt.optionLabel || getOptionLabel(i);
            var content = opt.optionContent || opt.text || '';
            var isSelected = (selectedAnswer === label);
            var checkedAttr = isSelected ? ' checked' : '';
            html += '<label class="flex items-center p-4 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors' + (isSelected ? ' border-[#1890FF] bg-blue-50' : '') + '">';
            html += '<input class="w-4 h-4 text-[#1890FF] mr-4" name="examQ" type="radio" value="' + label + '"' + checkedAttr + ' onchange="examSelectAnswer(\'' + label + '\')"/>';
            html += '<span class="font-medium text-gray-700">' + label + '. ' + content + '</span>';
            html += '</label>';
        }
    }
    container.innerHTML = html;

    renderExamAnswerCard();
}

function examSelectAnswer(label) {
    var q = examQuestions[examCurrentIndex];
    var qid = q.id || q.questionId;
    examAnswers[qid] = label;
    renderExamAnswerCard();
}

function examToggleMulti(label) {
    var q = examQuestions[examCurrentIndex];
    var qid = q.id || q.questionId;
    var current = examAnswers[qid] || '';
    var labels = current ? current.split(',') : [];
    var idx = labels.indexOf(label);
    if (idx === -1) {
        labels.push(label);
    } else {
        labels.splice(idx, 1);
    }
    labels.sort();
    examAnswers[qid] = labels.join(',');
    renderExamQuestion();
}

function examSaveTextAnswer() {
    var q = examQuestions[examCurrentIndex];
    var qid = q.id || q.questionId;
    var textarea = document.getElementById('examTextAnswer');
    if (textarea) {
        examAnswers[qid] = textarea.value;
        renderExamAnswerCard();
    }
}

function examSaveCurrentAnswer() {
    var q = examQuestions[examCurrentIndex];
    var qid = q.id || q.questionId;
    var qType = q.questionType || q.type || 1;
    if (qType == 4 || qType == 5) {
        var textarea = document.getElementById('examTextAnswer');
        if (textarea) examAnswers[qid] = textarea.value;
    }
}

function examJumpToQuestion(index) {
    examSaveCurrentAnswer();
    examCurrentIndex = index;
    renderExamQuestion();
}

function examPrevQuestion() {
    if (examCurrentIndex > 0) {
        examSaveCurrentAnswer();
        examCurrentIndex--;
        renderExamQuestion();
    }
}

function examNextQuestion() {
    if (examCurrentIndex < examQuestions.length - 1) {
        examSaveCurrentAnswer();
        examCurrentIndex++;
        renderExamQuestion();
    }
}

function startExamTimer() {
    if (examTimerInterval) clearInterval(examTimerInterval);
    updateExamTimerDisplay();
    examTimerInterval = setInterval(function() {
        examRemainingSeconds--;
        updateExamTimerDisplay();
        if (examRemainingSeconds <= 0) {
            // Time's up - auto submit
            clearInterval(examTimerInterval);
            examTimerInterval = null;
            alert('考试时间已到，系统将自动交卷');
            submitExam();
        }
    }, 1000);
}

function updateExamTimerDisplay() {
    document.getElementById('examTimer').textContent = formatTime(examRemainingSeconds);
    if (examRemainingSeconds < 300) {
        document.getElementById('examTimer').classList.add('text-red-500');
    }
}

function confirmSubmit() {
    var unanswered = examQuestions.length - Object.keys(examAnswers).length;
    var warningEl = document.getElementById('submitWarning');
    if (unanswered > 0) {
        warningEl.textContent = '你还有 ' + unanswered + ' 题未答。一旦提交将无法修改。';
    } else {
        warningEl.textContent = '所有题目已作答。确认提交后将无法修改。';
    }
    document.getElementById('submitModal').classList.remove('hidden');
}

function closeConfirm() {
    document.getElementById('submitModal').classList.add('hidden');
}

function submitExam() {
    // Save current answer before submit
    examSaveCurrentAnswer();

    // Hide modal
    document.getElementById('submitModal').classList.add('hidden');

    // Stop timer
    if (examTimerInterval) {
        clearInterval(examTimerInterval);
        examTimerInterval = null;
    }

    // Build answers array
    var answerList = [];
    for (var i = 0; i < examQuestions.length; i++) {
        var q = examQuestions[i];
        var qid = q.id || q.questionId;
        answerList.push({
            questionId: qid,
            studentAnswer: examAnswers[qid] || ''
        });
    }

    // Disable submit button
    var submitBtn = document.getElementById('confirmSubmitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = '提交中...';

    apiPost('/student/exams/' + examRecordId + '/submit', { answers: answerList }).then(function(result) {
        result = result.data || result;

        submitBtn.disabled = false;
        submitBtn.textContent = '确认提交';

        // Calculate elapsed time
        var elapsedSeconds = examTotalSeconds - examRemainingSeconds;

        // Hide exam interface, show result
        document.getElementById('examInterface').classList.add('hidden');
        document.getElementById('examResultPage').classList.remove('hidden');

        var score = result.totalScore != null ? result.totalScore : '--';
        var totalScore = result.paperTotalScore != null ? result.paperTotalScore : '100';
        var correctCount = result.correctCount != null ? result.correctCount : '--';
        var totalCount = result.questionCount || examQuestions.length;
        var accuracy = totalCount > 0 && correctCount !== '--' ? Math.round((correctCount / totalCount) * 100) : '--';

        document.getElementById('examResultSummary').textContent = '正确 ' + correctCount + ' / ' + totalCount + ' 题';
        document.getElementById('examResultScore').textContent = score + ' / ' + totalScore;
        document.getElementById('examResultAccuracy').textContent = (accuracy !== '--' ? accuracy + '%' : '--');
        document.getElementById('examResultTime').textContent = formatTime(elapsedSeconds);
    }).catch(function(err) {
        submitBtn.disabled = false;
        submitBtn.textContent = '确认提交';
        console.error('Failed to submit exam:', err);
        alert('交卷失败，请重试');
    });
}

		function openPasswordModal(event) {

			closeSettingsModal();
			document.getElementById('passwordModal').classList.remove('hidden');
		}
		function closePasswordModal() {
			document.getElementById('passwordModal').classList.add('hidden');
			document.getElementById('settingsForm').reset();
		}
		function savePassword(event) {
			event.preventDefault();
			var oldPwd = document.getElementById('sp_oldPassword').value.trim();
			var newPwd = document.getElementById('sp_newPassword').value.trim();
			var confirmPwd = document.getElementById('sp_confirmPassword').value.trim();
			if (!oldPwd || !newPwd || !confirmPwd) { alert('请填写所有字段'); return; }
			if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return; }
			if (newPwd.length < 4) { alert('新密码长度至少4位'); return; }
			fetch(API_BASE + '/auth/change-password', {
				method: 'PUT',
				headers: {'Content-Type': 'application/json'},
				credentials: 'include',
				body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
			}).then(function(res) { return res.json(); }).then(function(res) {
				if (res.code !== 200) { alert('修改失败：' + (res.message || '未知错误')); return; }
				alert('密码修改成功，请重新登录');
				window.location.href = 'login.html';
			}).catch(function() { alert('修改失败，请稍后重试'); });
			return false;
		}
