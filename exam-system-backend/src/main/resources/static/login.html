<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - 课程习题测验系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="iconify-icon.min.js"></script>
<style>
    body { background-color: #F0F2F5; }
    .tab-btn {
        color: #6B7280;
        border-bottom: 3px solid transparent;
        background: transparent;
        transition: all 0.25s ease;
        font-weight: 500;
    }
    .tab-btn:hover { color: #1890FF; background: #E6F0FF; }
    .tab-active {
        color: #1890FF !important;
        border-bottom-color: #1890FF !important;
        background: #E6F0FF !important;
        font-weight: 700 !important;
    }
</style>
</head>
<body class="h-screen flex items-center justify-center">
<div class="w-full max-w-md bg-white rounded-lg shadow-xl overflow-hidden">

<div class="bg-[#1890FF] py-8 text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-4 shadow-lg">
        <iconify-icon class="text-[#1890FF] text-3xl" icon="mdi:book-open-variant"></iconify-icon>
    </div>
    <h1 class="text-white text-2xl font-bold tracking-wider">课程习题测验系统</h1>
    <p class="text-blue-100 mt-2 opacity-80">智能教学 · 精准测验 · 轻松管理</p>
</div>

<!-- 角色切换 Tab — 增大加粗，选中时蓝底蓝字 -->
<div class="flex border-b">
    <button class="tab-btn flex-1 py-4 text-center text-base border-b-3 border-transparent" id="tab-admin" onclick="switchRole('admin')">
        <iconify-icon class="mr-1.5 align-middle" icon="mdi:shield-account"></iconify-icon>管理员
    </button>
    <button class="tab-btn flex-1 py-4 text-center text-base border-b-3 border-transparent" id="tab-teacher" onclick="switchRole('teacher')">
        <iconify-icon class="mr-1.5 align-middle" icon="mdi:account-tie"></iconify-icon>老师
    </button>
    <button class="tab-btn flex-1 py-4 text-center text-base border-b-3 border-transparent" id="tab-student" onclick="switchRole('student')">
        <iconify-icon class="mr-1.5 align-middle" icon="mdi:school"></iconify-icon>学生
    </button>
</div>

<div id="roleHint" class="mx-8 mt-4 p-3 bg-blue-50 border border-blue-200 text-blue-600 rounded-lg text-sm text-center font-medium">
    当前登录身份：<span id="roleLabel">管理员</span>
</div>

<div id="errorMsg" class="hidden mx-8 mt-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-center"></div>

<div class="p-8">
    <form class="space-y-6" id="loginForm" onsubmit="handleLogin(event)">
        <input id="currentRole" type="hidden" value="admin"/>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">账号</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <iconify-icon icon="mdi:account"></iconify-icon>
                </span>
                <input class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-[#1890FF] focus:border-[#1890FF]" id="username" placeholder="请输入管理账号" required="" type="text"/>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <iconify-icon icon="mdi:lock"></iconify-icon>
                </span>
                <input class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-[#1890FF] focus:border-[#1890FF]" id="password" placeholder="请输入密码" required="" type="password"/>
            </div>
        </div>
        <button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#1890FF] hover:bg-blue-600 focus:outline-none transition-colors" type="submit">立即登录</button>
    </form>
    <div class="mt-6 pt-4 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-500">还没有账号？<a class="font-medium text-[#1890FF] hover:underline" href="#">请联系系统管理员</a></p>
    </div>
</div>
</div>

<script>
    var API_BASE = '/api';
    var ROLE_NAMES = {admin: '管理员', teacher: '老师', student: '学生'};

    function switchRole(role) {
        document.getElementById('currentRole').value = role;
        document.getElementById('roleLabel').textContent = ROLE_NAMES[role];
        ['admin', 'teacher', 'student'].forEach(function(r) {
            var tab = document.getElementById('tab-' + r);
            if (r === role) { tab.classList.add('tab-active'); }
            else { tab.classList.remove('tab-active'); }
        });
        var input = document.getElementById('username');
        if (role === 'admin') input.placeholder = '请输入管理账号';
        else if (role === 'teacher') input.placeholder = '请输入工号';
        else input.placeholder = '请输入学号';
    }

    async function handleLogin(e) {
        e.preventDefault();
        var role = document.getElementById('currentRole').value;
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var errorEl = document.getElementById('errorMsg');
        var btn = e.target.querySelector('button[type="submit"]');
        errorEl.classList.add('hidden');
        btn.textContent = '登录中...';
        btn.disabled = true;

        try {
            var res = await fetch(API_BASE + '/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({role: role, username: username, password: password})
            });
            var data = await res.json();
            if (data.code === 200) {
                if (role === 'admin') window.location.href = 'admin_dashboard.html';
                else if (role === 'teacher') window.location.href = 'teacher_dashboard.html';
                else window.location.href = 'student_dashboard.html';
            } else {
                errorEl.textContent = data.message || '登录失败，请检查账号密码';
                errorEl.classList.remove('hidden');
            }
        } catch (err) {
            errorEl.textContent = '无法连接到服务器，请确认后端已启动 (localhost:8080)';
            errorEl.classList.remove('hidden');
        }
        btn.textContent = '立即登录';
        btn.disabled = false;
    }

    switchRole('admin');
</script>
</body>
</html>
