<script>
var API_BASE = '/api';

function apiGet(url, params) {
    var query = params ? '?' + new URLSearchParams(params).toString() : '';
    return fetch(API_BASE + url + query, { credentials: 'include' }).then(function(res) {
        if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
        return res.json();
    });
}
function apiPost(url, data) {
    return fetch(API_BASE + url, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(data) }).then(function(res) {
        if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
        return res.json();
    });
}

// State
var questions = [];
var answers = [];       // answers[i] = selected option label or value
var answerResults = []; // results[i] = { correct, correctAnswer } or null
var currentIndex = 0;
var timerInterval = null;
var timerSeconds = 0;
var submittedCount = 0;
var reviewMode = false; // 是否处于错题复习模式

// Load courses on page load
function loadCourses() {
    apiGet('/student/courses').then(function(data) {
        data = data.data || data;
        var select = document.getElementById('courseSelect');
        var courses = Array.isArray(data) ? data : (data && data.list ? data.list : []);
        select.innerHTML = '';
        if (courses.length === 0) {
            select.innerHTML = '<option value="">暂无课程</option>';
            return;
        }
        for (var i = 0; i < courses.length; i++) {
            var c = courses[i];
            select.innerHTML += '<option value="' + c.courseId + '">' + (c.courseName || '') + '</option>';
        }
    }).catch(function(err) {
        console.error('Failed to load courses:', err);
        document.getElementById('courseSelect').innerHTML = '<option value="">加载失败</option>';
    });
}
loadCourses();

function formatTime(seconds) {
    var m = Math.floor(seconds / 60);
    var s = seconds % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function getOptionLabel(index) {
    return String.fromCharCode(65 + index); // A, B, C, D...
}

function getTypeName(type) {
    if (type == 1) return '单选题';
    if (type == 2) return '多选题';
    if (type == 3) return '判断题';
    if (type == 4) return '填空题';
    if (type == 5) return '简答题';
    return '未知题型';
}

function startPractice() {
    var courseId = document.getElementById('courseSelect').value;
    var questionType = document.getElementById('questionTypeSelect').value;
    var difficulty = document.getElementById('difficultySelect').value;
    var count = parseInt(document.getElementById('questionCount').value, 10) || 10;

    if (!courseId) {
        alert('请选择课程');
        return;
    }
    if (count < 1 || count > 50) {
        alert('题目数量需在1-50之间');
        return;
    }

    var params = { courseId: courseId, count: count };
    if (questionType) params.questionType = parseInt(questionType);
    if (difficulty) params.difficulty = parseInt(difficulty);

    // Show loading state
    var btn = document.querySelector('#setupArea button');
    btn.disabled = true;
    btn.textContent = '正在生成题目...';

    apiPost('/student/practice/generate', params).then(function(data) {
        data = data.data || data;
        btn.disabled = false;
        btn.textContent = '开始练习';

        questions = Array.isArray(data) ? data : (data && data.questions ? data.questions : []);
        if (questions.length === 0) {
            alert('没有符合条件的题目，请调整筛选条件');
            return;
        }

        // Initialize state
        answers = new Array(questions.length);
        answerResults = new Array(questions.length);
        currentIndex = 0;
        submittedCount = 0;
        timerSeconds = 0;

        // Switch to practice area
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('practiceArea').classList.remove('hidden');
        document.getElementById('resultArea').classList.add('hidden');

        // Render answer card
        renderAnswerCard();
        // Render first question
        renderQuestion();
        // Start timer
        startTimer();
    }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = '开始练习';
        console.error('Failed to generate practice:', err);
        alert('生成题目失败，请重试');
    });
}

function renderAnswerCard() {
    var grid = document.getElementById('answerCardGrid');
    document.getElementById('answerCardTitle').textContent = reviewMode ? '复习模式' : ('答题卡 (' + submittedCount + '/' + questions.length + ')');
    var html = '';
    for (var i = 0; i < questions.length; i++) {
        var cls = 'w-8 h-8 rounded border flex items-center justify-center text-xs cursor-pointer ';
        if (i === currentIndex) {
            cls += 'bg-blue-500 text-white border-blue-500';
        } else if (reviewMode && answerResults[i]) {
            // 复习模式：绿色正确、红色错误
            if (answerResults[i].correct || answerResults[i].isCorrect) {
                cls += 'bg-green-500 text-white border-green-500';
            } else {
                cls += 'bg-red-500 text-white border-red-500';
            }
        } else if (answers[i] != null) {
            cls += 'bg-green-500 text-white border-green-500';
        } else {
            cls += 'text-gray-400 border-gray-200';
        }
        html += '<div class="' + cls + '" onclick="jumpToQuestion(' + i + ')">' + (i + 1) + '</div>';
    }
    grid.innerHTML = html;
}

function renderQuestion() {
    var q = questions[currentIndex];
    if (!q) return;

    var qtype = q.questionType || q.type;
    var options = q.options || [];
    var selectedAnswer = answers[currentIndex];
    var isConfirmed = answerResults[currentIndex] != null;
    var result = answerResults[currentIndex];

    document.getElementById('questionTypeLabel').textContent = getTypeName(qtype);
    document.getElementById('questionScore').textContent = '分值：' + (q.score || 10) + '分';
    document.getElementById('questionContent').textContent = (currentIndex + 1) + '. ' + (q.content || q.title || '');

    // 底部按钮
    document.getElementById('prevBtn').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
    var nextBtn = document.getElementById('nextBtn');
    nextBtn.disabled = false;
    if (reviewMode) {
        nextBtn.textContent = '返回结果';
        nextBtn.onclick = backToResult;
    } else if (isConfirmed) {
        var nextText = currentIndex === questions.length - 1 ? '完成练习' : '下一题';
        nextBtn.textContent = nextText;
        nextBtn.onclick = goNext;
    } else {
        nextBtn.textContent = '确认答案';
        nextBtn.onclick = confirmAnswer;
    }
    document.getElementById('practiceTimer').textContent = reviewMode ? '复习模式' : document.getElementById('practiceTimer').textContent;

    // 渲染内容区
    var container = document.getElementById('optionsContainer');
    var html = '';

    // === 选择题和判断题：渲染选项按钮 ===
    if (qtype == 1 || qtype == 2 || qtype == 3) {
        var multiSelected = qtype == 2 ? (selectedAnswer || '').split(',') : [];
        var disabled = isConfirmed || reviewMode ? ' disabled' : '';
        for (var i = 0; i < options.length; i++) {
            var opt = options[i];
            var label = opt.optionLabel || getOptionLabel(i);
            var content = opt.optionContent || '';
            var isSelected;
            if (qtype == 2) {
                isSelected = multiSelected.indexOf(label) >= 0;
            } else {
                isSelected = (selectedAnswer === label);
                if (!isSelected && qtype == 3 && (selectedAnswer === content)) {
                    isSelected = true;
                }
            }
            var cls = 'option-btn w-full text-left p-5 border-2 rounded-xl transition-all flex items-center';
            if (isSelected) cls += ' active';
            if (isConfirmed && result) {
                // 确认后高亮正确答案
                var correctAnswer = result.correctAnswer || '';
                var labels = correctAnswer.split(',');
                if (labels.indexOf(label) >= 0) {
                    cls += ' border-green-400 bg-green-50';
                } else if (isSelected && !(result.correct || result.isCorrect)) {
                    cls += ' border-red-400 bg-red-50';
                }
            }

            var labelCls = 'w-8 h-8 rounded-full border flex items-center justify-center mr-4 font-bold';
            if (isSelected && !isConfirmed) {
                labelCls += ' border-[#1890FF] bg-[#1890FF] text-white';
            } else {
                labelCls += ' border-gray-200';
            }

            var clickHandler = qtype == 2 ? 'toggleMultiChoice' : 'selectOption';
            html += '<button class="' + cls + '" onclick="' + clickHandler + '(\'' + label + '\')"' + disabled + '>';
            html += '<span class="' + labelCls + '">' + label + '</span>';
            html += content;
            html += '</button>';
        }
    }

    // === 填空题和简答题：文本输入 ===
    if (qtype == 4 || qtype == 5) {
        if (isConfirmed || reviewMode) {
            // 已确认：显示答案而非输入框
            html += '<div class="p-4 border-2 border-gray-200 rounded-xl text-lg">' + (selectedAnswer || '(未作答)') + '</div>';
        } else {
            html += '<textarea id="textAnswerInput" class="w-full border-2 border-gray-200 rounded-xl p-4 text-lg outline-none focus:border-[#1890FF] transition-colors"';
            html += ' placeholder="请输入你的答案..." rows="' + (qtype == 5 ? 4 : 2) + '">';
            html += (selectedAnswer || '');
            html += '</textarea>';
        }
    }

    // === 显示反馈（确认后或复习模式） ===
    if (isConfirmed && result) {
        var isCorrect = result.correct || result.isCorrect;
        html += '<div class="mt-4 p-4 rounded-lg ' + (isCorrect ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200') + '">';
        html += '<p class="font-bold">' + (isCorrect ? '✓ 回答正确' : '✗ 回答错误') + '</p>';
        html += '<p class="text-sm mt-1">你的答案：' + (result.studentAnswer || '') + '</p>';
        html += '<p class="text-sm mt-1">正确答案：' + (result.correctAnswer || '') + '</p>';
        if (result.analysis) html += '<p class="text-sm mt-1">解析：' + result.analysis + '</p>';
        html += '</div>';
    }

    container.innerHTML = html;
    renderAnswerCard();
}

// === 作答交互 ===

// 单选/判断：选中选项
function selectOption(label) {
    if (reviewMode || answerResults[currentIndex]) return;
    answers[currentIndex] = label;
    renderQuestion();
}

// 多选：切换选项
function toggleMultiChoice(label) {
    if (reviewMode || answerResults[currentIndex]) return;
    var current = answers[currentIndex] || '';
    var selected = current ? current.split(',') : [];
    var idx = selected.indexOf(label);
    if (idx >= 0) {
        selected.splice(idx, 1);
    } else {
        selected.push(label);
    }
    answers[currentIndex] = selected.filter(Boolean).join(',');
    renderQuestion();
}

// === 确认答案（统一入口） ===
function confirmAnswer() {
    var q = questions[currentIndex];
    var qtype = q.questionType || q.type;

    // 收集答案
    var answerToSubmit;
    if (qtype == 4 || qtype == 5) {
        var input = document.getElementById('textAnswerInput');
        if (!input || !input.value.trim()) { alert('请输入答案'); return; }
        answerToSubmit = input.value.trim();
        answers[currentIndex] = answerToSubmit;
    } else if (qtype == 2) {
        var selected = (answers[currentIndex] || '').split(',').filter(Boolean);
        if (selected.length < 2) { alert('多选题必须至少选择两个选项'); return; }
        answerToSubmit = selected.sort().join(',');
        answers[currentIndex] = answerToSubmit;
    } else if (qtype == 3) {
        if (!answers[currentIndex]) { alert('请选择答案'); return; }
        // 判断题：发送optionContent（对/错）而非optionLabel（A/B）
        var opts = q.options || [];
        for (var j = 0; j < opts.length; j++) {
            if (opts[j].optionLabel === answers[currentIndex]) {
                answerToSubmit = opts[j].optionContent;
                break;
            }
        }
        if (!answerToSubmit) answerToSubmit = answers[currentIndex];
    } else {
        // 单选
        if (!answers[currentIndex]) { alert('请选择答案'); return; }
        answerToSubmit = answers[currentIndex];
    }

    // 显示提交中
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('nextBtn').textContent = '提交中...';

    apiPost('/student/practice/submit', { questionId: q.questionId, studentAnswer: answerToSubmit }).then(function(res) {
        res = res.data || res;
        if (res != null) {
            answerResults[currentIndex] = res;
            if (answers[currentIndex] != null) submittedCount++;
            renderAnswerCard();
            renderQuestion();
        }
    }).catch(function(err) {
        console.error('Submit failed:', err);
        alert('提交失败，请重试');
        renderQuestion();
    });
}

// === 导航 ===
function goNext() {
    if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
    } else {
        finishPractice();
    }
}

function jumpToQuestion(index) {
    currentIndex = index;
    renderQuestion();
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerSeconds = 0;
    document.getElementById('practiceTimer').textContent = '00:00';
    timerInterval = setInterval(function() {
        timerSeconds++;
        document.getElementById('practiceTimer').textContent = formatTime(timerSeconds);
    }, 1000);
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function finishPractice() {
    stopTimer();
    reviewMode = false;

    // Count results
    var correctCount = 0;
    for (var i = 0; i < answerResults.length; i++) {
        if (answerResults[i] && (answerResults[i].correct || answerResults[i].isCorrect)) correctCount++;
    }
    var total = questions.length;
    var accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;

    // Switch to result area
    document.getElementById('practiceArea').classList.add('hidden');
    document.getElementById('resultArea').classList.remove('hidden');

    document.getElementById('resultSummary').textContent = '本次练习共 ' + total + ' 题，正确 ' + correctCount + ' 题，错误 ' + (total - correctCount) + ' 题';
    document.getElementById('resultAccuracy').textContent = accuracy + '%';
    document.getElementById('resultTime').textContent = formatTime(timerSeconds);
    document.getElementById('resultCorrectCount').textContent = correctCount + ' / ' + total;

    // Update icon based on performance
    var iconEl = document.getElementById('resultIcon');
    if (accuracy >= 80) {
        iconEl.innerHTML = '<iconify-icon class="text-5xl text-green-500" icon="mdi:check-circle"></iconify-icon>';
    } else if (accuracy >= 60) {
        iconEl.innerHTML = '<iconify-icon class="text-5xl text-orange-500" icon="mdi:alert-circle"></iconify-icon>';
    } else {
        iconEl.innerHTML = '<iconify-icon class="text-5xl text-red-500" icon="mdi:close-circle"></iconify-icon>';
    }
}

function reviewWrongQuestions() {
    // Find first wrong question and enter review mode
    var wrongIndex = -1;
    for (var i = 0; i < answerResults.length; i++) {
        if (answerResults[i] && !(answerResults[i].correct || answerResults[i].isCorrect)) {
            wrongIndex = i;
            break;
        }
    }
    if (wrongIndex >= 0) {
        reviewMode = true;
        currentIndex = wrongIndex;
        stopTimer();
        document.getElementById('practiceTimer').textContent = '复习模式';
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('practiceArea').classList.remove('hidden');
        // 修改完成按钮为"返回结果"
        document.getElementById('nextBtn').textContent = '返回结果';
        document.getElementById('nextBtn').onclick = backToResult;
        renderQuestion();
    } else {
        alert('恭喜，全部正确！');
    }
}

function backToResult() {
    reviewMode = false;
    document.getElementById('practiceArea').classList.add('hidden');
    document.getElementById('resultArea').classList.remove('hidden');
    // 恢复按钮
    document.getElementById('nextBtn').textContent = '完成练习';
    document.getElementById('nextBtn').onclick = goNext;
}

		function openPasswordModal(event) {

			closeSettingsModal();
			document.getElementById('passwordModal').classList.remove('hidden');
		}
		function closePasswordModal() {
			document.getElementById('passwordModal').classList.add('hidden');
			document.getElementById('settingsForm').reset();
		}
		function savePassword(event) {
			event.preventDefault();
			var oldPwd = document.getElementById('sp_oldPassword').value.trim();
			var newPwd = document.getElementById('sp_newPassword').value.trim();
			var confirmPwd = document.getElementById('sp_confirmPassword').value.trim();
			if (!oldPwd || !newPwd || !confirmPwd) { alert('请填写所有字段'); return; }
			if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return; }
			if (newPwd.length < 4) { alert('新密码长度至少4位'); return; }
			fetch(API_BASE + '/auth/change-password', {
				method: 'PUT',
				headers: {'Content-Type': 'application/json'},
				credentials: 'include',
				body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
			}).then(function(res) { return res.json(); }).then(function(res) {
				if (res.code !== 200) { alert('修改失败：' + (res.message || '未知错误')); return; }
				alert('密码修改成功，请重新登录');
				window.location.href = 'login.html';
			}).catch(function() { alert('修改失败，请稍后重试'); });
			return false;
		}
